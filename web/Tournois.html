<!-- Tournois.html -->
<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>GOUZEPE eFOOTBALL — Tournois</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="mobile.css">
<script src="common.js"></script>

<style>
  :root{
    --bg:#0b1220;--panel:#0f1627;--card:#0c1426;--text:#e5e7eb;--muted:#94a3b8;--border:#1f2937;
    --accent:#2563eb; --champ:#ef4444; --ok:#16a34a; --ko:#ef4444; --mid:#64748b;
    --pad:clamp(12px,2.5vw,22px); --brand:#16a34a;
  }
  :root.light{--bg:#f4f6fb;--panel:#ffffff;--card:#ffffff;--text:#0f172a;--muted:#475569;--border:#e5e7eb;--accent:#1d4ed8}
  *{box-sizing:border-box} html,body{height:100%}
  body{
    margin:0;color:var(--text);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Trebuchet MS",sans-serif;
    background:
      radial-gradient(900px 600px at 20% 0%, rgba(96,165,250,.12), transparent 40%),
      radial-gradient(900px 600px at 80% 100%, rgba(34,197,94,.10), transparent 40%),
      linear-gradient(180deg, rgba(7,10,22,.94), rgba(15,23,42,.96)),
      url('assets/icons/apple-touch-icon.png') center/cover fixed no-repeat;
  }
  html.light body{
    background:
      radial-gradient(900px 600px at 20% 0%, rgba(96,165,250,.18), transparent 42%),
      radial-gradient(900px 600px at 80% 100%, rgba(34,197,94,.16), transparent 42%),
      linear-gradient(180deg, rgba(255,255,255,.86), rgba(245,247,251,.92)),
      url('assets/icons/apple-touch-icon.png') center/cover fixed no-repeat;
  }
  .wrap{max-width:1400px;margin:auto;padding:12px}

  /* ===== TOP ===== */
  .top{
    position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:12px;
    padding:10px var(--pad);background:rgba(10,14,22,.65);backdrop-filter:blur(8px);border-bottom:1px solid var(--border)
  }
  html.light .top{background:rgba(255,255,255,.75)}
  .brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;user-select:none}
  .logo{width:42px;height:42px;border-radius:12px;object-fit:cover;border:1px solid var(--border);background:#0d1420}
  .brand-title{display:flex;flex-direction:column;line-height:1.1}
  .brand-title h1{margin:0;font-size:18px;letter-spacing:.3px;font-weight:800}
  .season-sub{margin:0;color:var(--muted);font-size:12px}
  #menuToggle{display:none;flex:0 0 auto;appearance:none;border:1px solid var(--border);background:transparent;color:inherit;border-radius:10px;padding:8px 10px;align-items:center;gap:8px}
  .nav{display:flex;align-items:center;gap:8px;overflow-x:auto;padding:4px 0;scrollbar-width:thin;-webkit-overflow-scrolling:touch}
  #menu{display:flex;gap:8px}
  .spacer{flex:1 1 auto} .tiny{font-size:12px;opacity:.8}
  @media (max-width: 900px){
    #menuToggle{display:inline-flex}
    .nav{display:none}
    .top.nav-open .nav{display:flex}
  }

  /* === Menu Mobile === */
  #mobileMenu{
    position:fixed; inset:0; z-index:60;
    background:rgba(0,0,0,.65); backdrop-filter:blur(4px);
    display:flex; align-items:flex-start; justify-content:center;
    padding:0; opacity:0; pointer-events:none;
    transition:opacity .25s ease;
  }
  #mobileMenu:not([hidden]){ opacity:1; pointer-events:auto; }
  #mobileMenu[hidden]{ display:none }

  .mm-panel{
    width:min(94vw,400px); margin-top:0;
    background:var(--panel); color:var(--text);
    border:none; border-bottom-left-radius:16px; border-bottom-right-radius:16px;
    box-shadow:0 8px 32px rgba(0,0,0,.4);
    padding:0; max-height:90vh; overflow-y:auto;
    transform:translateY(-100%); transition:transform .3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  #mobileMenu:not([hidden]) .mm-panel{ transform:translateY(0); }

  .mm-title{
    font-weight:800; text-align:center; padding:16px;
    border-bottom:1px solid var(--border); margin:0;
    position:sticky; top:0; background:var(--panel); z-index:1;
  }
  .mm-list{display:flex; flex-direction:column; gap:0; padding:8px;}
  .mm-btn{
    display:flex; align-items:center; justify-content:flex-start; gap:12px;
    padding:14px 16px; border-radius:12px; border:none;
    background:transparent; color:inherit; text-decoration:none; font-weight:600;
    transition:background .2s ease;
  }
  .mm-btn:hover, .mm-btn:active{ background:rgba(255,255,255,.06); }
  .mm-theme{display:flex; justify-content:center; padding:8px 16px; border-top:1px solid var(--border);}
  .mm-logout{display:flex; justify-content:center; padding:12px 16px; border-top:1px solid var(--border);}
  .mm-logout .btn{background:rgba(239,68,68,.12);border-color:#7f1d1d;color:#fca5a5; width:100%;}
  @media (min-width:841px){ #mobileMenu{ display:none !important } .menu-toggle{ display:none; } }

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:8px 12px;border-radius:999px;font-weight:600;border:1px solid var(--border);background:transparent;color:inherit;text-decoration:none;line-height:1;white-space:nowrap;transition:filter .15s,transform .02s}
  .btn:hover{filter:brightness(1.1)} .btn:active{transform:translateY(1px)}
  .btn.primary{background:rgba(22,163,74,.15);border-color:#1e3a2f}
  .btn.info{background:rgba(59,130,246,.14);border-color:#1e3a8a}
  .btn.warn{background:rgba(245,158,11,.14);border-color:#7c2d12}
  .btn.ghost{background:transparent}
  .btn.danger{background:#2a0c0c;border-color:#7f1d1d;color:#fecaca}
  select,input{border:1px solid var(--border);border-radius:12px;padding:10px 12px;background:#0b1020;color:var(--text)}
  html.light select,html.light input{background:#fff}
  .muted{color:var(--muted)}
  .hint{font-size:12px;color:var(--muted)}

  /* ===== TOURNOIS ===== */
  .section-header{display:flex;align-items:center;justify-content:space-between;margin:20px 0 16px;flex-wrap:wrap;gap:12px}
  .section-title{font-size:22px;font-weight:800;letter-spacing:.2px;margin:0}
  .filters{display:flex;gap:8px;flex-wrap:wrap}

  .tournaments-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(320px, 1fr));gap:16px;margin:20px 0}
  @media (max-width: 640px){
    .tournaments-grid{grid-template-columns:1fr}
  }

  .tournament-card{
    background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:18px;
    cursor:pointer;transition:transform .2s,border-color .2s;position:relative;overflow:hidden
  }
  .tournament-card:hover{transform:translateY(-2px);border-color:var(--accent)}
  .tournament-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:4px;
    background:linear-gradient(90deg, var(--accent), var(--ok));opacity:0;transition:opacity .2s
  }
  .tournament-card:hover::before{opacity:1}

  .tournament-header{display:flex;justify-content:space-between;align-items:start;margin-bottom:12px}
  .tournament-name{font-size:18px;font-weight:700;margin:0 0 4px;line-height:1.2}
  .tournament-status{
    display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;
    font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px
  }
  .status-draft{background:rgba(100,116,139,.2);color:#94a3b8}
  .status-registration{background:rgba(59,130,246,.2);color:#60a5fa}
  .status-in_progress{background:rgba(245,158,11,.2);color:#fbbf24}
  .status-completed{background:rgba(22,163,74,.2);color:#4ade80}
  .status-cancelled{background:rgba(239,68,68,.2);color:#f87171}

  .tournament-format{
    display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;
    background:rgba(139,92,246,.15);border:1px dashed rgba(139,92,246,.3);
    font-size:12px;font-weight:600;color:#c4b5fd;margin-bottom:8px
  }

  .tournament-desc{color:var(--muted);font-size:14px;margin:8px 0;line-height:1.4;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

  .tournament-stats{display:grid;grid-template-columns:repeat(3, 1fr);gap:12px;margin-top:12px}
  .stat{text-align:center}
  .stat-value{font-size:20px;font-weight:800;color:var(--accent)}
  .stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

  .tournament-footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
  .tournament-winner{display:flex;align-items:center;gap:8px;font-size:13px}
  .winner-medal{font-size:16px}

  /* === BRACKET === */
  .bracket-container{margin:20px 0;overflow-x:auto;padding:20px;background:var(--panel);border:1px solid var(--border);border-radius:16px}
  .bracket{display:flex;gap:40px;min-width:max-content}
  .bracket-round{display:flex;flex-direction:column;justify-content:space-around;gap:20px}
  .bracket-round-title{text-align:center;font-weight:700;margin-bottom:12px;color:var(--accent);text-transform:uppercase;font-size:12px;letter-spacing:1px}

  .bracket-match{
    background:var(--card);border:1px solid var(--border);border-radius:12px;
    min-width:220px;position:relative
  }
  .bracket-match.completed{border-color:var(--ok)}
  .bracket-match.in_progress{border-color:var(--warn);animation:pulse 2s ease-in-out infinite}

  @keyframes pulse{
    0%, 100%{opacity:1}
    50%{opacity:.7}
  }

  .match-player{
    display:flex;justify-content:space-between;align-items:center;padding:10px 12px;
    border-bottom:1px solid var(--border);transition:background .2s
  }
  .match-player:last-child{border-bottom:none}
  .match-player.winner{background:rgba(22,163,74,.1);font-weight:700}
  .match-player.loser{opacity:.6}

  .player-name{flex:1;font-size:14px}
  .player-name.empty{color:var(--muted);font-style:italic;font-size:13px}
  .player-score{font-size:16px;font-weight:700;min-width:28px;text-align:center}

  .match-info{text-align:center;padding:6px;background:rgba(0,0,0,.2);font-size:11px;color:var(--muted)}

  /* === STANDINGS === */
  .standings-table{width:100%;border-collapse:collapse;margin:20px 0}
  .standings-table thead{background:var(--card);position:sticky;top:0}
  .standings-table th{padding:12px;text-align:left;font-weight:700;color:var(--muted);border-bottom:2px solid var(--border)}
  .standings-table td{padding:12px;border-bottom:1px solid var(--border)}
  .standings-table tbody tr:hover{background:rgba(255,255,255,.03)}

  .placement{display:inline-flex;align-items:center;justify-content:center;
    width:32px;height:32px;border-radius:50%;font-weight:800;font-size:14px}
  .placement-1{background:linear-gradient(135deg, #ffd700, #ffed4e);color:#000}
  .placement-2{background:linear-gradient(135deg, #c0c0c0, #e8e8e8);color:#000}
  .placement-3{background:linear-gradient(135deg, #cd7f32, #e9a968);color:#000}

  /* === TABS === */
  .tabs{display:flex;gap:8px;border-bottom:2px solid var(--border);margin:20px 0}
  .tab{
    padding:10px 16px;border:none;background:transparent;color:var(--muted);
    font-weight:600;cursor:pointer;border-bottom:2px solid transparent;
    margin-bottom:-2px;transition:all .2s;border-radius:8px 8px 0 0
  }
  .tab:hover{color:var(--text);background:rgba(255,255,255,.03)}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(37,99,235,.08)}

  .tab-content{display:none}
  .tab-content.active{display:block}

  /* === LOADING === */
  .loading{text-align:center;padding:40px;color:var(--muted)}
  .spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--border);
    border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
  .empty-state-icon{font-size:48px;margin-bottom:16px;opacity:.5}
  .empty-state-title{font-size:20px;font-weight:700;margin-bottom:8px;color:var(--text)}
  .empty-state-desc{font-size:14px;max-width:400px;margin:0 auto}
</style>
</head>

<body>

<!-- Top Bar -->
<div class="top" id="topBar">
  <a href="Accueil.html" class="brand">
    <img src="assets/icons/apple-touch-icon.png" class="logo" alt="Logo">
    <div class="brand-title">
      <h1>GOUZEPE eFOOT</h1>
      <p class="season-sub" id="seasonSub">Tournois</p>
    </div>
  </a>

  <div class="spacer"></div>

  <!-- Desktop Nav -->
  <nav class="nav nav-desktop" id="menu">
    <a href="Accueil.html" class="btn ghost">🏠 Accueil</a>
    <a href="Classement-general.html" class="btn ghost">📊 Classement</a>
    <a href="Tournois.html" class="btn primary">🏆 Tournois</a>
    <a href="Panel-Membre.html" class="btn ghost">👤 Mon Profil</a>
    <span id="adminLink"></span>
  </nav>

  <!-- Mobile Menu Toggle -->
  <button id="menuToggle" class="menu-toggle">
    <span>☰</span>
    <span class="tiny">Menu</span>
  </button>

  <button class="btn ghost" id="themeToggle" title="Changer de thème">🌙</button>
  <button class="btn danger" onclick="logout()">🚪 Quitter</button>
</div>

<!-- Mobile Menu -->
<div id="mobileMenu" hidden>
  <div class="mm-panel">
    <h2 class="mm-title">📱 Menu</h2>
    <div class="mm-list">
      <a href="Accueil.html" class="mm-btn">🏠 Accueil</a>
      <a href="Classement-general.html" class="mm-btn">📊 Classement</a>
      <a href="Tournois.html" class="mm-btn">🏆 Tournois</a>
      <a href="Panel-Membre.html" class="mm-btn">👤 Mon Profil</a>
      <span id="adminLinkMobile"></span>
    </div>
    <div class="mm-theme">
      <button class="btn" id="themeToggleMobile">🌙 Changer de thème</button>
    </div>
    <div class="mm-logout">
      <button class="btn danger" onclick="logout()">🚪 Déconnexion</button>
    </div>
  </div>
</div>

<!-- Main Content -->
<div class="wrap">

  <div class="section-header">
    <h2 class="section-title">🏆 Tournois</h2>
    <div class="filters">
      <select id="statusFilter" onchange="loadTournaments()">
        <option value="">Tous les statuts</option>
        <option value="draft">Brouillon</option>
        <option value="registration">Inscription</option>
        <option value="in_progress">En cours</option>
        <option value="completed">Terminé</option>
      </select>
      <select id="formatFilter" onchange="loadTournaments()">
        <option value="">Tous les formats</option>
        <option value="single_elimination">Simple Élimination</option>
        <option value="double_elimination">Double Élimination</option>
        <option value="round_robin">Round Robin</option>
      </select>
      <span id="adminTournamentBtn"></span>
    </div>
  </div>

  <!-- Loading State -->
  <div id="loadingState" class="loading" style="display:none">
    <div class="spinner"></div>
    <p>Chargement des tournois...</p>
  </div>

  <!-- Empty State -->
  <div id="emptyState" class="empty-state" style="display:none">
    <div class="empty-state-icon">🏆</div>
    <h3 class="empty-state-title">Aucun tournoi</h3>
    <p class="empty-state-desc">Aucun tournoi n'est actuellement disponible. Revenez plus tard ou contactez un administrateur.</p>
  </div>

  <!-- Tournaments Grid -->
  <div id="tournamentsGrid" class="tournaments-grid"></div>

  <!-- Tournament Details (Hidden by default) -->
  <div id="tournamentDetails" style="display:none">
    <div style="margin-bottom:20px">
      <button class="btn" onclick="showTournamentsList()">← Retour à la liste</button>
    </div>

    <div style="background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px">
      <div style="display:flex;justify-content:space-between;align-items:start;flex-wrap:wrap;gap:16px">
        <div>
          <h2 id="detailName" style="margin:0 0 8px;font-size:28px;font-weight:800"></h2>
          <p id="detailDesc" style="color:var(--muted);margin:0 0 12px"></p>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <span id="detailStatus"></span>
            <span id="detailFormat"></span>
          </div>
        </div>
        <div id="detailWinner" style="text-align:right"></div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('bracket')">📊 Bracket</button>
      <button class="tab" onclick="switchTab('standings')">🏅 Classement</button>
      <button class="tab" onclick="switchTab('matches')">⚔️ Matchs</button>
    </div>

    <!-- Tab Contents -->
    <div id="tabBracket" class="tab-content active">
      <div id="bracketContainer"></div>
    </div>

    <div id="tabStandings" class="tab-content">
      <div id="standingsContainer"></div>
    </div>

    <div id="tabMatches" class="tab-content">
      <div id="matchesContainer"></div>
    </div>
  </div>

</div>

<script>
// === Configuration ===
const API_BASE = getApiBase();
let currentUser = null;
let currentTournamentId = null;
let tournaments = [];
let currentTournament = null;

// === Init ===
document.addEventListener('DOMContentLoaded', async () => {
  initTheme();
  initMobileMenu();

  const token = localStorage.getItem('efoot.token');
  if (!token) {
    window.location.href = 'login.html';
    return;
  }

  try {
    const me = await apiGet('/auth/me');
    currentUser = me.user;

    // Show admin link if admin
    if (me.user.role === 'admin') {
      document.getElementById('adminLink').innerHTML = '<a href="Admin-Tournois.html" class="btn info">⚙️ Admin Tournois</a>';
      document.getElementById('adminLinkMobile').innerHTML = '<a href="Admin-Tournois.html" class="mm-btn">⚙️ Admin Tournois</a>';
      document.getElementById('adminTournamentBtn').innerHTML = '<a href="Admin-Tournois.html" class="btn primary">➕ Nouveau Tournoi</a>';
    }

    await loadTournaments();
  } catch (err) {
    console.error('Auth error:', err);
    localStorage.removeItem('efoot.token');
    window.location.href = 'login.html';
  }
});

// === Load Tournaments ===
async function loadTournaments() {
  const loadingState = document.getElementById('loadingState');
  const emptyState = document.getElementById('emptyState');
  const grid = document.getElementById('tournamentsGrid');

  loadingState.style.display = 'block';
  emptyState.style.display = 'none';
  grid.innerHTML = '';

  try {
    const statusFilter = document.getElementById('statusFilter').value;
    const formatFilter = document.getElementById('formatFilter').value;

    let url = '/tournaments?limit=100';
    if (statusFilter) url += `&status=${statusFilter}`;
    if (formatFilter) url += `&format=${formatFilter}`;

    const data = await apiGet(url);
    tournaments = data.tournaments || [];

    loadingState.style.display = 'none';

    if (tournaments.length === 0) {
      emptyState.style.display = 'block';
      return;
    }

    tournaments.forEach(tournament => {
      const card = createTournamentCard(tournament);
      grid.appendChild(card);
    });

  } catch (err) {
    console.error('Error loading tournaments:', err);
    loadingState.style.display = 'none';
    emptyState.style.display = 'block';
  }
}

// === Create Tournament Card ===
function createTournamentCard(tournament) {
  const card = document.createElement('div');
  card.className = 'tournament-card';
  card.onclick = () => showTournamentDetails(tournament.id);

  const statusClass = `status-${tournament.status}`;
  const statusLabels = {
    draft: 'Brouillon',
    registration: 'Inscriptions',
    in_progress: 'En cours',
    completed: 'Terminé',
    cancelled: 'Annulé'
  };

  const formatLabels = {
    single_elimination: '📋 Simple Élimination',
    double_elimination: '📊 Double Élimination',
    round_robin: '🔄 Round Robin'
  };

  const progress = tournament.total_matches > 0
    ? Math.round((tournament.completed_matches / tournament.total_matches) * 100)
    : 0;

  card.innerHTML = `
    <div class="tournament-header">
      <div style="flex:1">
        <h3 class="tournament-name">${escapeHtml(tournament.name)}</h3>
        <span class="tournament-format">${formatLabels[tournament.format] || tournament.format}</span>
      </div>
      <span class="tournament-status ${statusClass}">${statusLabels[tournament.status] || tournament.status}</span>
    </div>

    ${tournament.description ? `<p class="tournament-desc">${escapeHtml(tournament.description)}</p>` : ''}

    <div class="tournament-stats">
      <div class="stat">
        <div class="stat-value">${tournament.participant_count || 0}</div>
        <div class="stat-label">Joueurs</div>
      </div>
      <div class="stat">
        <div class="stat-value">${tournament.total_matches || 0}</div>
        <div class="stat-label">Matchs</div>
      </div>
      <div class="stat">
        <div class="stat-value">${progress}%</div>
        <div class="stat-label">Progression</div>
      </div>
    </div>

    ${tournament.winner_name ? `
      <div class="tournament-footer">
        <div class="tournament-winner">
          <span class="winner-medal">🏆</span>
          <span><strong>${escapeHtml(tournament.winner_name)}</strong></span>
        </div>
      </div>
    ` : ''}
  `;

  return card;
}

// === Show Tournament Details ===
async function showTournamentDetails(tournamentId) {
  currentTournamentId = tournamentId;

  document.getElementById('tournamentsGrid').style.display = 'none';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('tournamentDetails').style.display = 'block';

  try {
    const data = await apiGet(`/tournaments/${tournamentId}`);
    currentTournament = data;

    renderTournamentDetails(data);
    document.getElementById('loadingState').style.display = 'none';

  } catch (err) {
    console.error('Error loading tournament details:', err);
    alert('Erreur lors du chargement du tournoi');
    showTournamentsList();
  }
}

// === Render Tournament Details ===
function renderTournamentDetails(data) {
  const { tournament, participants, matches } = data;

  const statusClass = `status-${tournament.status}`;
  const statusLabels = {
    draft: 'Brouillon',
    registration: 'Inscriptions',
    in_progress: 'En cours',
    completed: 'Terminé',
    cancelled: 'Annulé'
  };

  const formatLabels = {
    single_elimination: '📋 Simple Élimination',
    double_elimination: '📊 Double Élimination',
    round_robin: '🔄 Round Robin'
  };

  document.getElementById('detailName').textContent = tournament.name;
  document.getElementById('detailDesc').textContent = tournament.description || '';
  document.getElementById('detailStatus').innerHTML = `<span class="tournament-status ${statusClass}">${statusLabels[tournament.status]}</span>`;
  document.getElementById('detailFormat').innerHTML = `<span class="tournament-format">${formatLabels[tournament.format]}</span>`;

  if (tournament.winner_name) {
    document.getElementById('detailWinner').innerHTML = `
      <div style="font-size:14px;color:var(--muted);margin-bottom:4px">Champion</div>
      <div style="font-size:24px;font-weight:800">🏆 ${escapeHtml(tournament.winner_name)}</div>
      ${tournament.runner_up_name ? `<div style="font-size:14px;color:var(--muted);margin-top:4px">🥈 ${escapeHtml(tournament.runner_up_name)}</div>` : ''}
      ${tournament.third_place_name ? `<div style="font-size:14px;color:var(--muted)">🥉 ${escapeHtml(tournament.third_place_name)}</div>` : ''}
    `;
  } else {
    document.getElementById('detailWinner').innerHTML = '';
  }

  renderBracket(matches, tournament.format);
  renderStandings(participants);
  renderMatchesList(matches);
}

// === Render Bracket ===
function renderBracket(matches, format) {
  const container = document.getElementById('bracketContainer');

  if (!matches || matches.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🏆</div><p>Le bracket n\'a pas encore été généré</p></div>';
    return;
  }

  if (format === 'round_robin') {
    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔄</div><p>Format Round Robin - Voir l\'onglet Matchs pour les détails</p></div>';
    return;
  }

  const rounds = {};
  matches.forEach(match => {
    const key = `${match.bracket_type}-${match.round}`;
    if (!rounds[key]) rounds[key] = [];
    rounds[key].push(match);
  });

  let html = '<div class="bracket-container"><div class="bracket">';

  // Winners Bracket
  const winnersRounds = Object.keys(rounds).filter(k => k.startsWith('winners-')).sort();
  winnersRounds.forEach(key => {
    const roundNum = key.split('-')[1];
    html += `
      <div class="bracket-round">
        <div class="bracket-round-title">Round ${roundNum}</div>
        ${rounds[key].map(m => renderBracketMatch(m)).join('')}
      </div>
    `;
  });

  // Losers Bracket (double elimination)
  const losersRounds = Object.keys(rounds).filter(k => k.startsWith('losers-')).sort();
  if (losersRounds.length > 0) {
    html += '<div style="width:2px;background:var(--border);margin:0 20px"></div>';
    losersRounds.forEach(key => {
      const roundNum = key.split('-')[1];
      html += `
        <div class="bracket-round">
          <div class="bracket-round-title">Losers ${roundNum}</div>
          ${rounds[key].map(m => renderBracketMatch(m)).join('')}
        </div>
      `;
    });
  }

  // Finals
  if (rounds['finals-1']) {
    html += '<div style="width:2px;background:var(--border);margin:0 20px"></div>';
    html += `
      <div class="bracket-round">
        <div class="bracket-round-title">Finale</div>
        ${rounds['finals-1'].map(m => renderBracketMatch(m)).join('')}
      </div>
    `;
  }

  // Third Place
  if (rounds['third_place-1']) {
    html += `
      <div class="bracket-round">
        <div class="bracket-round-title">3ème place</div>
        ${rounds['third_place-1'].map(m => renderBracketMatch(m)).join('')}
      </div>
    `;
  }

  html += '</div></div>';
  container.innerHTML = html;
}

function renderBracketMatch(match) {
  const statusClass = match.status === 'completed' ? 'completed' : match.status === 'in_progress' ? 'in_progress' : '';

  const p1Class = match.winner_id === match.player1_id ? 'winner' : match.status === 'completed' ? 'loser' : '';
  const p2Class = match.winner_id === match.player2_id ? 'winner' : match.status === 'completed' ? 'loser' : '';

  return `
    <div class="bracket-match ${statusClass}">
      <div class="match-player ${p1Class}">
        <span class="player-name ${!match.player1_name ? 'empty' : ''}">
          ${match.player1_name || 'TBD'}
        </span>
        ${match.player1_score !== null ? `<span class="player-score">${match.player1_score}</span>` : ''}
      </div>
      <div class="match-player ${p2Class}">
        <span class="player-name ${!match.player2_name ? 'empty' : ''}">
          ${match.player2_name || 'TBD'}
        </span>
        ${match.player2_score !== null ? `<span class="player-score">${match.player2_score}</span>` : ''}
      </div>
      ${match.status === 'pending' ? '<div class="match-info">En attente</div>' : ''}
      ${match.status === 'in_progress' ? '<div class="match-info">En cours</div>' : ''}
    </div>
  `;
}

// === Render Standings ===
function renderStandings(participants) {
  const container = document.getElementById('standingsContainer');

  if (!participants || participants.length === 0) {
    container.innerHTML = '<div class="empty-state"><p>Aucun participant</p></div>';
    return;
  }

  let html = `
    <table class="standings-table">
      <thead>
        <tr>
          <th>Position</th>
          <th>Joueur</th>
          <th style="text-align:center">V</th>
          <th style="text-align:center">D</th>
          <th style="text-align:center">+/-</th>
          <th style="text-align:center">Pts Pour</th>
          <th style="text-align:center">Pts Contre</th>
        </tr>
      </thead>
      <tbody>
  `;

  participants.forEach((p, idx) => {
    const placement = p.final_placement || (idx + 1);
    const placementClass = placement <= 3 ? `placement-${placement}` : '';
    const diff = p.points_for - p.points_against;

    html += `
      <tr>
        <td><span class="placement ${placementClass}">${placement}</span></td>
        <td><strong>${escapeHtml(p.player_name)}</strong></td>
        <td style="text-align:center">${p.wins}</td>
        <td style="text-align:center">${p.losses}</td>
        <td style="text-align:center;color:${diff > 0 ? 'var(--ok)' : diff < 0 ? 'var(--ko)' : 'var(--muted)'}">
          ${diff > 0 ? '+' : ''}${diff}
        </td>
        <td style="text-align:center">${p.points_for}</td>
        <td style="text-align:center">${p.points_against}</td>
      </tr>
    `;
  });

  html += '</tbody></table>';
  container.innerHTML = html;
}

// === Render Matches List ===
function renderMatchesList(matches) {
  const container = document.getElementById('matchesContainer');

  if (!matches || matches.length === 0) {
    container.innerHTML = '<div class="empty-state"><p>Aucun match</p></div>';
    return;
  }

  const byBracket = {};
  matches.forEach(m => {
    if (!byBracket[m.bracket_type]) byBracket[m.bracket_type] = [];
    byBracket[m.bracket_type].push(m);
  });

  let html = '';

  Object.keys(byBracket).forEach(bracketType => {
    const label = {
      winners: '🏆 Winner\'s Bracket',
      losers: '💔 Loser\'s Bracket',
      finals: '👑 Finale',
      third_place: '🥉 3ème place',
      round_robin: '🔄 Round Robin'
    }[bracketType] || bracketType;

    html += `<h3 style="margin-top:24px;margin-bottom:12px">${label}</h3>`;
    html += '<div style="display:grid;gap:12px">';

    byBracket[bracketType].forEach(match => {
      const statusClass = `status-${match.status}`;
      const statusLabels = {
        pending: 'En attente',
        in_progress: 'En cours',
        completed: 'Terminé',
        walkover: 'Walkover'
      };

      html += `
        <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <span style="font-weight:700;color:var(--muted)">Round ${match.round} - Match ${match.match_number}</span>
            <span class="tournament-status ${statusClass}">${statusLabels[match.status]}</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;gap:16px">
            <div style="flex:1;text-align:center">
              <div style="font-weight:${match.winner_id === match.player1_id ? '800' : '400'};font-size:16px">
                ${match.player1_name || 'TBD'}
              </div>
              ${match.player1_score !== null ? `<div style="font-size:24px;font-weight:800;margin-top:4px">${match.player1_score}</div>` : ''}
            </div>
            <div style="color:var(--muted);font-weight:700">VS</div>
            <div style="flex:1;text-align:center">
              <div style="font-weight:${match.winner_id === match.player2_id ? '800' : '400'};font-size:16px">
                ${match.player2_name || 'TBD'}
              </div>
              ${match.player2_score !== null ? `<div style="font-size:24px;font-weight:800;margin-top:4px">${match.player2_score}</div>` : ''}
            </div>
          </div>
        </div>
      `;
    });

    html += '</div>';
  });

  container.innerHTML = html;
}

// === Show Tournaments List ===
function showTournamentsList() {
  document.getElementById('tournamentDetails').style.display = 'none';
  document.getElementById('tournamentsGrid').style.display = 'grid';
  currentTournamentId = null;
  currentTournament = null;
}

// === Switch Tab ===
function switchTab(tabName) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

  event.target.classList.add('active');
  document.getElementById(`tab${tabName.charAt(0).toUpperCase() + tabName.slice(1)}`).classList.add('active');
}

// === Helper Functions ===
function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// === Mobile Menu ===
function initMobileMenu() {
  const toggle = document.getElementById('menuToggle');
  const menu = document.getElementById('mobileMenu');

  if (toggle && menu) {
    toggle.addEventListener('click', (e) => {
      e.stopPropagation();
      const isHidden = menu.hasAttribute('hidden');
      if (isHidden) {
        menu.removeAttribute('hidden');
      } else {
        menu.setAttribute('hidden', '');
      }
    });

    menu.addEventListener('click', (e) => {
      if (e.target === menu) {
        menu.setAttribute('hidden', '');
      }
    });
  }
}

// === Theme Toggle ===
function initTheme() {
  const savedTheme = localStorage.getItem('theme') || 'dark';
  if (savedTheme === 'light') {
    document.documentElement.classList.add('light');
  }

  const updateThemeBtn = () => {
    const isLight = document.documentElement.classList.contains('light');
    document.getElementById('themeToggle').textContent = isLight ? '☀️' : '🌙';
    document.getElementById('themeToggleMobile').textContent = isLight ? '☀️ Mode Sombre' : '🌙 Mode Clair';
  };

  updateThemeBtn();

  document.getElementById('themeToggle').addEventListener('click', () => {
    document.documentElement.classList.toggle('light');
    const isLight = document.documentElement.classList.contains('light');
    localStorage.setItem('theme', isLight ? 'light' : 'dark');
    updateThemeBtn();
  });

  document.getElementById('themeToggleMobile').addEventListener('click', () => {
    document.documentElement.classList.toggle('light');
    const isLight = document.documentElement.classList.contains('light');
    localStorage.setItem('theme', isLight ? 'light' : 'dark');
    updateThemeBtn();
  });
}
</script>
