<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>GOUZEPE - Tournois</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="common.css">
<link rel="stylesheet" href="mobile.css">
<script defer src="common.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  .wrap{max-width:none!important;padding:12px 20px!important}
  .layout{display:grid;grid-template-columns:300px 1fr;gap:14px;margin-top:12px;align-items:start}
  @media(max-width:960px){.layout{grid-template-columns:1fr}}
  /* ── Left panel ── */
  .tours-panel{position:sticky;top:12px}
  .tours-panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .tours-panel-header h3{margin:0;font-size:15px}
  /* ── Tournament cards ── */
  .tour-card{width:100%;text-align:left;padding:12px 14px 12px 17px;border:1px solid var(--border);border-radius:13px;background:rgba(255,255,255,.03);cursor:pointer;transition:border-color .18s,box-shadow .18s,background .18s;position:relative;overflow:hidden;margin-bottom:7px;color:var(--text);font-family:inherit;font-size:inherit;outline:none}
  .tour-card:last-child{margin-bottom:0}
  .tour-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px;background:var(--border);transition:background .18s}
  .tour-card:hover{border-color:rgba(99,102,241,.45);box-shadow:0 4px 16px rgba(0,0,0,.25);background:rgba(255,255,255,.05)}
  .tour-card:focus-visible{border-color:rgba(99,102,241,.7);box-shadow:0 0 0 2px rgba(99,102,241,.3)}
  .tour-card.active{border-color:rgba(99,102,241,.6);background:rgba(99,102,241,.08)}
  .tour-card.active::before{background:#818cf8}
  .tour-card.t-live::before{background:#4ade80}
  .tour-card.t-live{border-color:rgba(22,163,74,.3)}
  .tour-card.t-live:hover{border-color:rgba(22,163,74,.6);background:rgba(22,163,74,.04)}
  .tour-card.t-live.active{background:rgba(22,163,74,.08)}
  .tour-card.t-completed::before{background:#60a5fa}
  .tour-card.t-completed{border-color:rgba(59,130,246,.2)}
  .tour-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
  .tour-title{font-weight:700;font-size:13.5px;line-height:1.35;flex:1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;color:var(--text)}
  .tour-card-info{display:flex;align-items:center;gap:6px;margin-top:7px;flex-wrap:wrap}
  .tour-fmt{font-size:11px;padding:2px 8px;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--muted);white-space:nowrap;letter-spacing:.01em}
  .tour-players{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:3px}
  .tour-winner-line{margin-top:7px;font-size:11.5px;color:#86efac;display:flex;align-items:center;gap:5px;font-weight:600;padding:4px 6px;background:rgba(22,163,74,.08);border-radius:6px}
  .status{display:inline-flex;padding:2px 8px;border-radius:999px;border:1px solid var(--border);font-size:11px;text-transform:uppercase}
  .status.live{background:rgba(22,163,74,.15);color:#86efac}
  .status.draft{background:rgba(245,158,11,.15);color:#fcd34d}
  .status.completed{background:rgba(59,130,246,.16);color:#93c5fd}
  .status.archived{background:rgba(100,116,139,.18);color:#cbd5e1}
  .rounds{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(220px,1fr);gap:12px;overflow:auto;padding-bottom:4px}
  .round{border:1px solid var(--border);border-radius:12px;background:var(--card);padding:10px}
  .round h4{margin:0 0 8px;font-size:13px;color:var(--muted);text-transform:uppercase}
  .match{border:1px solid var(--border);border-radius:10px;padding:8px;margin-bottom:8px}
  .line{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:4px 0}
  .line.win{font-weight:700;color:#86efac}
  .score{font-variant-numeric:tabular-nums}
  .empty{padding:18px;color:var(--muted)}
  /* Live pulse */
  @keyframes pulse-live{0%,100%{opacity:1}50%{opacity:.5}}
  .status.live{animation:pulse-live 2s ease-in-out infinite}
  /* Bracket polish */
  .match{transition:box-shadow .15s,border-color .15s}
  .match:hover{box-shadow:0 3px 10px rgba(0,0,0,.18)}
  .match.m-ready{border-color:rgba(22,163,74,.5)}
  .match.m-completed{opacity:.82}
  .line.win{background:rgba(22,163,74,.1);border-radius:5px;padding:4px 6px}
  .score-val{font-weight:600;min-width:22px;text-align:center;background:rgba(255,255,255,.07);border-radius:5px;padding:1px 6px;font-variant-numeric:tabular-nums}
  .score-val.win-score{background:rgba(22,163,74,.22);color:#86efac}
  /* Winner banner */
  @keyframes winner-in{from{opacity:0;transform:scale(.9) translateY(-4px)}to{opacity:1;transform:none}}
  .winner-banner{animation:winner-in .35s ease;background:rgba(22,163,74,.12);border:1px solid rgba(22,163,74,.3);border-radius:10px;padding:10px 16px;font-weight:700;color:#86efac;display:flex;align-items:center;gap:8px;margin-bottom:10px}
  /* Bracket fade-in */
  @keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
  .rounds{animation:fadeIn .22s ease}
  /* DE sections */
  .bracket-section{margin-bottom:28px;padding-top:4px}
  .section-label{margin:0 0 10px;font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;display:flex;align-items:center;gap:7px}
  .section-label::before{content:'';display:inline-block;width:10px;height:3px;border-radius:2px;background:currentColor;flex-shrink:0}
  .wb-label{color:#60a5fa}
  .lb-label{color:#f59e0b}
  .gf-label{color:#86efac}
  /* LB: compact fixed-width columns */
  .lb-rounds{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px}
  .lb-rounds .round{min-width:190px;width:190px;flex-shrink:0}
  /* GF: narrow centered card */
  .gf-section{border:1px solid rgba(22,163,74,.28);border-radius:14px;padding:14px 16px;background:rgba(22,163,74,.05)}
  .gf-match-wrap{display:inline-block;min-width:280px;max-width:380px}
  .gf-match-wrap .match{margin-bottom:0;border-color:rgba(22,163,74,.4);background:rgba(22,163,74,.04)}
  /* RR compact cards */
  .rr-matches{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:5px;margin-top:4px}
  .rr-card{display:grid;grid-template-columns:1fr max-content 1fr;align-items:center;gap:8px;padding:6px 10px;border:1px solid var(--border);border-radius:8px;transition:border-color .15s}
  .rr-card.m-ready{border-color:rgba(22,163,74,.4)}
  .rr-card.m-completed{opacity:.8}
  .rr-name{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100px}
  .rr-name-right{text-align:right}
  .rr-win{font-weight:700;color:#86efac}
  .rr-scores{display:flex;align-items:center;gap:5px;justify-content:center;padding:3px 8px;background:rgba(255,255,255,.05);border-radius:6px;flex-shrink:0}
  .rr-dot{color:var(--muted);font-size:11px}
  .standings-table{width:100%;font-size:12.5px;border-collapse:collapse}
  .standings-table th{font-weight:700;color:var(--muted);padding:5px 8px;text-align:center;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.04em}
  .standings-table td{padding:5px 8px;text-align:center;color:var(--text)}
  .standings-table td:nth-child(2){text-align:left;font-weight:500}
  .standings-table tbody tr:nth-child(even){background:rgba(255,255,255,.03)}
  .standings-table tbody tr:hover{background:rgba(255,255,255,.05)}
  .standings-table tbody tr:first-child td{color:#86efac;font-weight:700}
  .standings-table .pts-col{font-weight:700;color:var(--text)}
  /* Bracket tree */
  .bt-outer{overflow-x:auto;overflow-y:visible;padding:8px 4px 12px}
  .bt-wrap{position:relative;overflow:visible}
  .bt-svg{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}
  .bt-match{position:absolute;overflow:visible}
  .bt-match .match{margin-bottom:0;width:160px}
  .bt-label{position:absolute;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);text-align:center;white-space:nowrap}
  /* Groups + Knockout */
  .group-section{border:1px solid rgba(167,139,250,.18);border-radius:14px;padding:14px 14px 10px;background:rgba(167,139,250,.04);position:relative;overflow:hidden}
  .group-section::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#a78bfa,#818cf8);border-radius:14px 14px 0 0}
  .group-label{margin:0 0 10px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#a78bfa;display:flex;align-items:center;gap:6px}
  .group-label::after{content:'';flex:1;height:1px;background:rgba(167,139,250,.2)}
  .standings-table .qualifier-row td:first-child{color:#a78bfa;font-weight:700}
  .standings-table .qualifier-row{background:rgba(167,139,250,.07)!important}
  /* Knockout tree section title */
  .knockout-section-title{margin:18px 0 8px;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#60a5fa;display:flex;align-items:center;gap:8px}
  .knockout-section-title::before{content:'';width:12px;height:3px;border-radius:2px;background:#60a5fa;flex-shrink:0}
  /* RR section polish */
  .rr-section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:12px 0 6px}
  /* ── Final standings sidebar (SE / DE / RR) ── */
  .bracket-area{display:flex;gap:16px;align-items:start}
  .bracket-inner{flex:1;min-width:0}
  #finalStandings{width:230px;flex-shrink:0;display:none}
  @media(max-width:960px){.bracket-area{flex-direction:column}#finalStandings{width:100%}}
  /* ── Final standings shared styles ── */
  .fs-panel{border:1px solid var(--border);border-radius:13px;overflow:hidden;background:var(--card)}
  .fs-header{padding:10px 14px;background:rgba(255,255,255,.03);border-bottom:1px solid var(--border);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);display:flex;align-items:center;gap:6px}
  .fs-table{width:100%;border-collapse:collapse;font-size:13px}
  .fs-table td{padding:7px 12px;border-bottom:1px solid var(--border);color:var(--text)}
  .fs-table tr:last-child td{border-bottom:none}
  .fs-table tr:hover td{background:rgba(255,255,255,.04)}
  .fs-pos{width:32px;text-align:center;font-weight:700;font-size:15px;color:var(--muted)}
  .fs-name{font-weight:500}
  .fs-rank-1 .fs-pos{color:#f5c518}
  .fs-rank-2 .fs-pos{color:#94a3b8}
  .fs-rank-3 .fs-pos{color:#cd7f32}
  .fs-rank-1 .fs-name{font-weight:700;color:var(--text)}
  /* ── Groups + Knockout: inline final standings (below groups, multi-column) ── */
  .gk-final-wrap{margin-top:22px}
  .gk-final-wrap .fs-panel{max-width:100%}
  .gk-fs-grid{display:flex;flex-wrap:wrap;gap:0}
  .fs-row{display:flex;align-items:center;gap:0;padding:7px 12px;border-bottom:1px solid var(--border);min-width:180px;flex:1 1 180px;box-sizing:border-box}
  .fs-row:last-child{border-bottom:none}
  .fs-row:hover{background:rgba(255,255,255,.04)}
  /* ── Groups grid (wider cards) ── */
  .groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:18px;margin-top:12px}
</style>

<script>
const API_BASE = (localStorage.getItem('efoot.api') || ('http://' + (location.hostname || 'localhost') + ':3005')).replace(/\/+$/,'');
const TOKEN = localStorage.getItem('efoot.token') || '';
let tournaments = [];
let selectedId = null;

function hd(method='GET'){
  return { method, headers: { Authorization: 'Bearer ' + TOKEN, 'Content-Type':'application/json' } };
}
async function api(path, opt){
  const r = await fetch(API_BASE + path, opt || hd());
  if (r.status === 401) { location.replace('login.html'); throw new Error('401'); }
  const d = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(d.error || ('HTTP ' + r.status));
  return d;
}
function esc(x){ return String(x == null ? '' : x).replace(/[&<>"']/g, (c)=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function statusClass(st){ return ['live','draft','completed','archived'].includes(st) ? st : ''; }

const FMT_LABEL = { single_elimination:'Élim. directe', round_robin:'Round Robin', double_elimination:'Double Élim.', groups_knockout:'Groupes' };
const STATUS_LABEL = { live:'En cours', draft:'Brouillon', completed:'Terminé', archived:'Archivé' };

function renderList(){
  const box = document.getElementById('tournamentsList');
  box.innerHTML = '';
  if (!tournaments.length){
    box.innerHTML = '<div class="empty" style="padding:14px;text-align:center;font-size:13px">Aucun tournoi.</div>';
    return;
  }
  const order = { live:0, draft:1, completed:2, archived:3 };
  const sorted = [...tournaments].sort((a,b) => (order[a.status]??9) - (order[b.status]??9));
  sorted.forEach(t => {
    const isLive = t.status === 'live';
    const isDone = t.status === 'completed';
    const el = document.createElement('button');
    el.type = 'button';
    el.className = `tour-card t-${t.status}${t.id === selectedId ? ' active' : ''}`;
    el.innerHTML = `
      <div class="tour-card-top">
        <span class="tour-title">${esc(t.name)}</span>
        <span class="status ${statusClass(t.status)}" style="flex-shrink:0">${STATUS_LABEL[t.status]||t.status}</span>
      </div>
      <div class="tour-card-info">
        <span class="tour-fmt">${FMT_LABEL[t.format]||t.format}</span>
        <span class="tour-players">
          <i data-lucide="users" style="width:11px;height:11px"></i>
          ${t.participants_count||0}
        </span>
      </div>
      ${isDone && t.winner_name ? `<div class="tour-winner-line">
        <i data-lucide="trophy" style="width:11px;height:11px"></i> ${esc(t.winner_name)}
      </div>` : ''}`;
    el.onclick = () => { selectedId = t.id; renderList(); loadTournament(t.id); if(window.lucide) lucide.createIcons({nodes:[box]}); };
    box.appendChild(el);
  });
  if (window.lucide) lucide.createIcons({ nodes: [box] });
}

/* ── Shared match card (read-only) ── */
function matchCard(m){
  const s1 = Number.isInteger(m.score_p1) ? m.score_p1 : '–';
  const s2 = Number.isInteger(m.score_p2) ? m.score_p2 : '–';
  const w1 = m.winner_participant_id && m.winner_participant_id === m.p1_participant_id;
  const w2 = m.winner_participant_id && m.winner_participant_id === m.p2_participant_id;
  const mCls = m.status === 'completed' ? 'm-completed' : (m.p1_participant_id && m.p2_participant_id ? 'm-ready' : '');
  return `<div class="match ${mCls}">
    <div class="line ${w1?'win':''}"><span>${esc(m.p1_name||'TBD')}</span><span class="score-val ${w1?'win-score':''}">${s1}</span></div>
    <div class="line ${w2?'win':''}"><span>${esc(m.p2_name||'TBD')}</span><span class="score-val ${w2?'win-score':''}">${s2}</span></div>
  </div>`;
}

/* ── Bracket tree constants + renderer (read-only) ── */
const BT_H=62,BT_G=12,BT_U=74,BT_W=160,BT_C=36,BT_PAD=26;
function btCY(r,s){ return (s+.5)*Math.pow(2,r)*BT_U+BT_PAD; }
function btTY(r,s){ return btCY(r,s)-BT_H/2; }
function btLX(r){ return r*(BT_W+BT_C); }

function renderBracketTree(container,matches,labelFn){
  const rm=new Map();
  matches.forEach(m=>{if(!rm.has(m.round_no))rm.set(m.round_no,[]);rm.get(m.round_no).push(m);});
  const rks=[...rm.keys()].sort((a,b)=>a-b);
  if(!rks.length){container.innerHTML='<div class="empty">Bracket vide.</div>';return;}
  const R=rks.length,S0=rm.get(rks[0]).length;
  const tW=R*(BT_W+BT_C)-BT_C,tH=S0*BT_U+BT_PAD;
  let lines='';
  for(let ri=0;ri<R-1;ri++){
    const cur=rm.get(rks[ri]).sort((a,b)=>a.slot_no-b.slot_no);
    for(let si=0;si<cur.length;si+=2){
      const cy0=btCY(ri,si),hasSib=si+1<cur.length;
      const cy1=hasSib?btCY(ri,si+1):cy0;
      const cyP=btCY(ri+1,Math.floor(si/2));
      const rx=btLX(ri)+BT_W,mx=rx+BT_C/2,lx=btLX(ri+1);
      lines+=`<line x1="${rx}" y1="${cy0}" x2="${mx}" y2="${cy0}"/>`;
      if(hasSib){lines+=`<line x1="${rx}" y1="${cy1}" x2="${mx}" y2="${cy1}"/><line x1="${mx}" y1="${cy0}" x2="${mx}" y2="${cy1}"/>`;}
      lines+=`<line x1="${mx}" y1="${cyP}" x2="${lx}" y2="${cyP}"/>`;
    }
  }
  let html='';
  for(let ri=0;ri<R;ri++){
    const lbl=labelFn?labelFn(rks[ri],ri,rks):`R${rks[ri]}`;
    html+=`<div class="bt-label" style="left:${btLX(ri)}px;top:4px;width:${BT_W}px">${esc(lbl)}</div>`;
  }
  for(let ri=0;ri<R;ri++){
    rm.get(rks[ri]).sort((a,b)=>a.slot_no-b.slot_no).forEach((m,si)=>{
      html+=`<div class="bt-match" data-match-id="${m.id}" style="left:${btLX(ri)}px;top:${btTY(ri,si)}px;width:${BT_W}px">${matchCard(m)}</div>`;
    });
  }
  container.innerHTML=`<div class="bt-outer"><div class="bt-wrap" style="width:${tW}px;height:${tH}px">
    <svg class="bt-svg" width="${tW}" height="${tH}" viewBox="0 0 ${tW} ${tH}"><g stroke="rgba(100,116,139,.4)" stroke-width="1.5" fill="none">${lines}</g></svg>
    ${html}
  </div></div>`;
}

/* ── Single elimination ── */
function bracketSE(matches){
  const el=document.getElementById('bracket');
  el.className='';
  if(!matches.length){el.innerHTML='<div class="empty">Bracket vide.</div>';return;}
  renderBracketTree(el,matches,(rNo,idx,arr)=>
    idx===arr.length-1?'Finale':(idx===arr.length-2?'Demi-finales':`Round ${rNo}`));
}

/* ── Double elimination ── */
function bracketDE(matches){
  const wb=matches.filter(m=>m.bracket_side==='W');
  const lb=matches.filter(m=>m.bracket_side==='L');
  const gf=matches.filter(m=>m.bracket_side==='GF');
  const el=document.getElementById('bracket');
  el.className='';
  el.innerHTML='';
  if(!matches.length){el.innerHTML='<div class="empty">Bracket vide.</div>';return;}
  if(wb.length){
    const sec=document.createElement('div');sec.className='bracket-section';
    sec.innerHTML='<p class="section-label wb-label">Winner Bracket</p>';
    const tc=document.createElement('div');
    renderBracketTree(tc,wb,(rNo,idx,ka)=>{
      if(idx===ka.length-1)return'WB Finale';
      if(idx===ka.length-2)return'WB Demi-finales';
      return`WB Round ${rNo}`;
    });
    sec.appendChild(tc);el.appendChild(sec);
  }
  if(lb.length){
    const mp=new Map();
    lb.forEach(m=>{if(!mp.has(m.round_no))mp.set(m.round_no,[]);mp.get(m.round_no).push(m);});
    const lbHtml=[...mp.keys()].sort((a,b)=>a-b).map((rNo,idx,ka)=>{
      const rs=mp.get(rNo).sort((a,b)=>a.slot_no-b.slot_no);
      return`<div class="round"><h4>${esc(idx===ka.length-1?'LB Finale':`LB Round ${rNo-10}`)}</h4>${rs.map(m=>matchCard(m)).join('')}</div>`;
    }).join('');
    const sec=document.createElement('div');sec.className='bracket-section';
    sec.innerHTML=`<p class="section-label lb-label">Loser Bracket</p><div class="lb-rounds">${lbHtml}</div>`;
    el.appendChild(sec);
  }
  if(gf.length){
    const sec=document.createElement('div');sec.className='bracket-section gf-section';
    sec.innerHTML=`<p class="section-label gf-label">Grande Finale</p><div class="gf-match-wrap">${gf.map(m=>matchCard(m)).join('')}</div>`;
    el.appendChild(sec);
  }
}

function matchCardRR(m){
  const s1 = Number.isInteger(m.score_p1) ? m.score_p1 : '–';
  const s2 = Number.isInteger(m.score_p2) ? m.score_p2 : '–';
  const w1 = m.winner_participant_id && m.winner_participant_id === m.p1_participant_id;
  const w2 = m.winner_participant_id && m.winner_participant_id === m.p2_participant_id;
  const mCls = m.status === 'completed' ? 'm-completed' : (m.p1_participant_id && m.p2_participant_id ? 'm-ready' : '');
  return `<div class="rr-card ${mCls}">
    <span class="rr-name rr-name-right ${w1?'rr-win':''}">${esc(m.p1_name||'TBD')}</span>
    <div class="rr-scores"><span class="score-val ${w1?'win-score':''}">${s1}</span><span class="rr-dot">·</span><span class="score-val ${w2?'win-score':''}">${s2}</span></div>
    <span class="rr-name ${w2?'rr-win':''}">${esc(m.p2_name||'TBD')}</span>
  </div>`;
}

function roundRobin(tournamentId, matches){
  const matchesHtml = matches.map(m => matchCardRR(m)).join('');
  const el = document.getElementById('bracket');
  el.className = '';
  el.innerHTML = `<div class="rr-matches">${matchesHtml || '<div class="empty">Bracket vide.</div>'}</div>`;
}

function groupsKnockout(tournamentId, matches, tournament){
  const groupMatches = matches.filter(m => m.bracket_side === 'G');
  const knockoutMatches = matches.filter(m => m.bracket_side !== 'G');
  const el = document.getElementById('bracket');
  el.className = '';
  const groupMap = new Map();
  groupMatches.forEach(m => {
    const gn = m.group_no ?? 0;
    if (!groupMap.has(gn)) groupMap.set(gn, []);
    groupMap.get(gn).push(m);
  });
  const GL = 'ABCDEFGHIJKLMNOP';
  let html = '';
  if (!groupMap.size) {
    html = '<div class="empty">Phase de groupes vide.</div>';
  } else {
    html += '<div class="groups-grid">';
    [...groupMap.keys()].sort((a,b)=>a-b).forEach(gn => {
      const gms = groupMap.get(gn).sort((a,b)=>a.slot_no-b.slot_no);
      html += `<div class="group-section">
        <p class="group-label">Groupe ${GL[gn]||gn}</p>
        <div id="gst-${gn}"><div class="muted" style="font-size:12px">Chargement…</div></div>
        <div class="rr-section-title">Matchs</div>
        <div class="rr-matches">${gms.map(m=>matchCardRR(m)).join('')}</div>
      </div>`;
    });
    html += '</div>';
  }
  if (knockoutMatches.length) {
    html += '<div class="bracket-section" style="margin-top:14px"><p class="section-label wb-label">Tableau final</p><div id="koTreeCnt"></div></div>';
  }
  el.innerHTML = html;
  if (knockoutMatches.length) {
    const tc = document.getElementById('koTreeCnt');
    if (tc) renderBracketTree(tc, knockoutMatches, (rNo,idx,arr)=>
      idx===arr.length-1?'Finale':(idx===arr.length-2?'Demi-finales':`Round ${rNo}`));
  }
  (async () => {
    try {
      const d = await api(`/tournaments/${tournamentId}/standings`, hd());
      const gList = d.groups || [];
      const qpg = tournament.qualifiers_per_group || 2;
      gList.forEach(({ group_no, standings }) => {
        const cnt = document.getElementById(`gst-${group_no}`);
        if (!cnt) return;
        if (!standings.length) { cnt.innerHTML = '<div class="muted" style="font-size:12px">Classement après les premiers matchs.</div>'; return; }
        cnt.innerHTML = `<table class="standings-table" style="font-size:12px">
          <thead><tr><th>#</th><th style="text-align:left">Joueur</th><th>J</th><th>Pts</th><th>Diff</th></tr></thead>
          <tbody>${standings.map((s,i)=>`<tr ${i<qpg?'class="qualifier-row"':''}>
            <td>${i+1}</td><td style="text-align:left">${esc(s.name)}</td>
            <td>${s.played}</td><td><strong>${s.pts}</strong></td>
            <td>${s.diff>=0?'+':''}${s.diff}</td>
          </tr>`).join('')}</tbody>
        </table>`;
      });
      // ── Final standings (injected at bottom when tournament completed) ──
      if (tournament.status === 'completed') {
        const MEDALS = { 1:'🥇', 2:'🥈', 3:'🥉' };
        let rows = [];
        if (knockoutMatches.length) {
          // Derive ranking from KO bracket
          rows = seStandings(knockoutMatches);
        } else {
          // Pure group phase: interleave positions (1st of each group, then 2nd, etc.)
          const maxPos = Math.max(...gList.map(g => g.standings.length), 0);
          let rank = 1;
          for (let pos = 0; pos < maxPos; pos++) {
            gList.forEach(g => {
              if (g.standings[pos]) rows.push({ rank: rank++, name: g.standings[pos].name });
            });
          }
        }
        if (rows.length) {
          rows.sort((a,b) => a.rank - b.rank || (a.name||'').localeCompare(b.name||''));
          const rowsHtml = rows.map(r => {
            const pos = MEDALS[r.rank] || r.rank;
            const cls = r.rank <= 3 ? `fs-rank-${r.rank}` : '';
            return `<div class="fs-row ${cls}"><span class="fs-pos">${pos}</span><span class="fs-name">${esc(r.name||'—')}</span></div>`;
          }).join('');
          const wrap = document.createElement('div');
          wrap.className = 'gk-final-wrap';
          wrap.innerHTML = `<div class="fs-panel">
            <div class="fs-header"><i data-lucide="bar-chart-2" style="width:13px;height:13px"></i> Classement final du tournoi</div>
            <div class="gk-fs-grid">${rowsHtml}</div>
          </div>`;
          el.appendChild(wrap);
          if (window.lucide) lucide.createIcons({ nodes: [wrap] });
        }
      }
    } catch(_) {
      [...groupMap.keys()].forEach(gn => {
        const cnt = document.getElementById(`gst-${gn}`);
        if (cnt) cnt.innerHTML = '';
      });
    }
  })();
}

/* ── Final standings computation (client-side) ── */
function seStandings(matches) {
  const roundMap = new Map();
  matches.forEach(m => {
    if (!roundMap.has(m.round_no)) roundMap.set(m.round_no, []);
    roundMap.get(m.round_no).push(m);
  });
  const rounds = [...roundMap.keys()].sort((a,b) => b-a);
  const rows = []; let rank = 1;
  rounds.forEach((rNo, idx) => {
    const all = roundMap.get(rNo);
    const done = all.filter(m => m.status === 'completed');
    if (idx === 0) {
      done.forEach(m => {
        const wn = m.winner_participant_id === m.p1_participant_id ? m.p1_name : m.p2_name;
        const ln = m.winner_participant_id === m.p1_participant_id ? m.p2_name : m.p1_name;
        if (wn) rows.push({ rank:1, name:wn });
        if (ln) rows.push({ rank:2, name:ln });
      });
      rank = 3;
    } else {
      const sr = rank;
      done.forEach(m => {
        const ln = m.winner_participant_id === m.p1_participant_id ? m.p2_name : m.p1_name;
        if (ln && ln !== 'TBD') rows.push({ rank:sr, name:ln });
      });
      rank += all.length;
    }
  });
  return rows;
}

async function showFinalStandings(t, matches) {
  const panel = document.getElementById('finalStandings');
  let rows = [];
  let isRR = false;
  if (t.format === 'single_elimination') {
    rows = seStandings(matches);
  } else if (t.format === 'groups_knockout') {
    const koMatches = matches.filter(m => m.bracket_side !== 'G');
    if (koMatches.length) rows = seStandings(koMatches);
    if (!rows.length) { panel.style.display = 'none'; panel.innerHTML = ''; return; }
  } else if (t.format === 'double_elimination') {
    const gf = matches.filter(m => m.bracket_side === 'GF' && m.status === 'completed');
    gf.forEach(m => {
      const wn = m.winner_participant_id === m.p1_participant_id ? m.p1_name : m.p2_name;
      const ln = m.winner_participant_id === m.p1_participant_id ? m.p2_name : m.p1_name;
      if (wn) rows.push({ rank:1, name:wn });
      if (ln) rows.push({ rank:2, name:ln });
    });
    const lb = matches.filter(m => m.bracket_side === 'L');
    const lbRnds = [...new Set(lb.map(m => m.round_no))].sort((a,b) => b-a);
    let rank = 3;
    lbRnds.forEach(rNo => {
      const rms = lb.filter(m => m.round_no === rNo && m.status === 'completed');
      const sr = rank;
      rms.forEach(m => {
        const ln = m.winner_participant_id === m.p1_participant_id ? m.p2_name : m.p1_name;
        if (ln && ln !== 'TBD') rows.push({ rank:sr, name:ln });
      });
      rank += lb.filter(m => m.round_no === rNo).length;
    });
  } else if (t.format === 'round_robin') {
    isRR = true;
    try {
      const d = await api(`/tournaments/${t.id}/standings`, hd());
      (d.standings || []).forEach((s, i) => rows.push({ rank:i+1, name:s.name, pts:s.pts }));
    } catch(_) {}
  }
  if (!rows.length) { panel.style.display = 'none'; panel.innerHTML = ''; return; }
  rows.sort((a,b) => a.rank - b.rank || (a.name||'').localeCompare(b.name||''));
  const MEDALS = { 1:'🥇', 2:'🥈', 3:'🥉' };
  const rowsHtml = rows.map(r => {
    const pos = MEDALS[r.rank] || r.rank;
    const cls = r.rank <= 3 ? `fs-rank-${r.rank}` : '';
    const ptsHtml = r.pts != null ? `<span style="color:var(--muted);font-size:11px;margin-left:4px">${r.pts}pts</span>` : '';
    return `<tr class="${cls}"><td class="fs-pos">${pos}</td><td class="fs-name">${esc(r.name||'—')}${ptsHtml}</td></tr>`;
  }).join('');
  const title = t.status === 'completed' ? 'Classement final' : 'Classement';
  panel.innerHTML = `<div class="fs-panel">
    <div class="fs-header"><i data-lucide="bar-chart-2" style="width:13px;height:13px"></i> ${title}</div>
    <table class="fs-table"><tbody>${rowsHtml}</tbody></table>
  </div>`;
  panel.style.display = '';
  if (window.lucide) lucide.createIcons({ nodes: [panel] });
}

function renderBracket(bundle){
  const t = bundle.tournament;
  const matches = bundle.matches || [];
  document.getElementById('title').textContent = t.name;
  document.getElementById('statusBadge').className = `status ${statusClass(t.status)}`;
  document.getElementById('statusBadge').textContent = STATUS_LABEL[t.status]||t.status;
  document.getElementById('meta').textContent = `${t.participants_count||0} participants · ${FMT_LABEL[t.format]||t.format}`;
  const winnerEl = document.getElementById('winner');
  if (t.winner_name){
    winnerEl.innerHTML = `<div class="winner-banner"><i data-lucide="trophy" style="width:18px;height:18px"></i> Vainqueur : ${esc(t.winner_name)}</div>`;
    if (window.lucide) lucide.createIcons({ nodes: [winnerEl] });
  } else {
    winnerEl.innerHTML = t.status === 'live' ? '<span class="muted" style="font-size:13px">Vainqueur : en cours…</span>' : '';
  }
  showFinalStandings(t, matches);
  if (t.format === 'round_robin') return roundRobin(t.id, matches);
  if (t.format === 'double_elimination') return bracketDE(matches);
  if (t.format === 'groups_knockout') return groupsKnockout(t.id, matches, t);
  bracketSE(matches);
}

async function loadTournament(id){
  const d = await api('/tournaments/' + encodeURIComponent(id), hd());
  renderBracket(d);
}

async function reloadAll(){
  const d = await api('/tournaments', hd());
  tournaments = d.tournaments || [];
  if (!selectedId && tournaments.length) {
    const first = tournaments.find(t => t.status === 'live') || tournaments[0];
    selectedId = first.id;
  }
  renderList();
  if (selectedId) await loadTournament(selectedId);
}

document.getElementById('reloadBtn').onclick = () => reloadAll().catch(e => alert(e.message));
reloadAll().catch(e => {
  document.getElementById('bracket').textContent = e.message || 'Erreur chargement';
});
</script>
