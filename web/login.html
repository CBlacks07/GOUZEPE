<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Connexion — GOUZEPE</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-store" />
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="mobile.css">
<meta name="color-scheme" content="dark light">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
  :root{
    --bg:#0b1220; --panel:#0f1627; --panel-veil:rgba(2,6,23,.55);
    --text:#e5e7eb; --muted:#94a3b8; --border:#1f2937;
    --accent:#60a5fa; --accent-veil:rgba(96,165,250,.25);
    --btn:#14532d; --btn2:#0b1b0f; --btnText:#d1fae5;
  }
  :root.light{
    --bg:#f4f6fb; --panel:#ffffff; --panel-veil:rgba(255,255,255,.75);
    --text:#0f172a; --muted:#475569; --border:#e5e7eb;
    --accent:#2563eb; --accent-veil:rgba(37,99,235,.18);
    --btn:#155e75; --btn2:#e6f4ff; --btnText:#0b1220;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Trebuchet MS",sans-serif;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  .wrap{
    min-height:100dvh; min-block-size:100svh;
    display:grid; place-items:center;
    padding:max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    background:
      radial-gradient(900px 600px at 20% 0%, rgba(96,165,250,.12), transparent 40%),
      radial-gradient(900px 600px at 80% 100%, rgba(34,197,94,.10), transparent 40%),
      url('assets/icons/apple-touch-icon.png') center/cover fixed no-repeat;
  }
  html.light .wrap{
    background:
      radial-gradient(900px 600px at 20% 0%, rgba(96,165,250,.18), transparent 42%),
      radial-gradient(900px 600px at 80% 100%, rgba(34,197,94,.16), transparent 42%),
      url('assets/icons/apple-touch-icon.png') center/cover fixed no-repeat;
  }

  .card{
    position:relative; margin-inline:auto; width:min(560px,94vw);
    background:linear-gradient(to bottom right, var(--panel), var(--panel));
    border:1px solid var(--border); border-radius:18px;
    box-shadow:0 14px 60px rgba(0,0,0,.45);
    overflow:hidden;
    backdrop-filter:saturate(1.2) blur(6px);
  }
  .head{padding:20px 18px; border-bottom:1px solid var(--border)}
  .head.center{display:grid; place-items:center}
  .logo{height:68px; width:auto; display:block; border-radius:14px}

  .body{padding:18px 18px 10px}
  h2{margin:0 0 12px; font-size:18px; font-weight:700; text-align:center}
  label{display:block; margin:10px 0 6px; color:var(--muted); font-weight:600}
  input{
    width:100%; padding:14px; border:1px solid var(--border); border-radius:12px;
    background:rgba(11,16,32,.85); color:var(--text); font-size:16px;
    outline:none; transition:border-color .15s ease, box-shadow .15s ease, background .15s;
  }
  html.light input{background:#fff}
  input::placeholder{color:color-mix(in oklab, var(--muted) 75%, transparent)}
  input:focus-visible{
    border-color:var(--accent);
    box-shadow:0 0 0 3px var(--accent-veil);
    background:rgba(11,16,32,.92);
  }

  .field{position:relative}
  .field .toggle{
    position:absolute; right:8px; top:50%; transform:translateY(-50%);
    border:1px solid var(--border); background:transparent; border-radius:10px;
    padding:6px 8px; cursor:pointer;
  }

  .btn{
    border:1px solid var(--border); background:linear-gradient(to bottom, var(--btn2), var(--btn));
    color:var(--btnText); border-radius:12px; padding:12px 16px; cursor:pointer;
    font-weight:700; letter-spacing:.2px; transition:transform .08s ease, filter .12s ease;
  }
  .btn:hover{filter:brightness(1.05)}
  .btn:active{transform:translateY(1px)}
  .iconbtn{
    border:1px solid var(--border); background:transparent; border-radius:12px;
    padding:10px 12px; cursor:pointer; color:var(--text);
  }
  .iconbtn.float{position:absolute; top:10px; right:10px}

  .error{color:#ef4444; min-height:20px; margin-top:8px}
  .muted{color:var(--muted)}

  .footer{
    padding:14px 18px 18px;
    display:flex; gap:12px; align-items:center; justify-content:space-between;
  }

  @media (max-width: 520px){
    .footer{flex-direction:column; align-items:stretch}
    .btn{width:100%}
  }
  .gear{position:fixed; right:16px; bottom:16px; z-index:30}

  dialog{border:none; border-radius:14px; max-width:520px; width:min(92vw,520px); padding:0; background:var(--panel); color:var(--text)}
  dialog::backdrop{background:rgba(0,0,0,.35)}
  .dlg-h{padding:14px 16px; border-bottom:1px solid var(--border); font-weight:700}
  .dlg-b{padding:14px 16px; display:grid; gap:10px}
  .dlg-f{padding:14px 16px; border-top:1px solid var(--border); display:flex; gap:10px; justify-content:flex-end}

  /* petite ligne de statut */
  #boot{min-height:20px; margin-top:6px; font-size:14px; color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="head center">
      <img class="logo" src="assets/icons/apple-touch-icon.png" alt="GOUZEPE">
    </div>
    <button id="theme" class="iconbtn float" title="Basculer thème" aria-label="Basculer thème"></button>

    <form id="f" class="body" autocomplete="on">
      <h2>Connexion</h2>

      <label>Email</label>
      <input id="email" type="email" placeholder="admin@gz.local" required>

      <label>Mot de passe</label>
      <div class="field">
        <input id="pwd" type="password" placeholder="••••••••" required>
        <button type="button" id="togglePwd" class="toggle" title="Afficher / masquer" aria-label="Afficher ou masquer le mot de passe"></button>
      </div>

      <div id="err" class="error"></div>
      <div id="boot" class="muted">—</div>

      <div class="footer">
        <span class="muted">Session : 1h</span>
        <button id="submit" class="btn" type="submit">Se connecter</button>
      </div>
    </form>
  </div>

  <button id="cfgBtn" class="iconbtn gear" title="Configurer l'API" aria-label="Configurer l'API"></button>
  <dialog id="cfg">
    <div class="dlg-h">Configuration de l’API</div>
    <div class="dlg-b">
      <label>Adresse API (ex: http://localhost:3005 ou http://192.168.1.10:3005)</label>
      <input id="apiUrl">
      <div id="cfgMsg" class="muted">—</div>
    </div>
    <div class="dlg-f">
      <button class="iconbtn" id="cfgTest">Tester</button>
      <button class="iconbtn" id="cfgSave">Enregistrer</button>
      <button class="iconbtn" id="cfgClose">Fermer</button>
    </div>
  </dialog>
</div>

<script>
function icon(name){
  const m = {
    moon: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a7 7 0 1 0 9 9 9 9 0 1 1-9-9z"/></svg>',
    sun: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>',
    eye: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>',
    eyeOff: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20C5 20 1 12 1 12a21.77 21.77 0 0 1 5.06-7.94"/><path d="M9.9 4.24A10.93 10.93 0 0 1 12 4c7 0 11 8 11 8a21.79 21.79 0 0 1-3.17 5.02"/><path d="M1 1l22 22"/></svg>',
    settings: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>'
  };
  return m[name] || '';
}

/* ===== Thème ===== */
(function(){
  const k='efoot.theme';
  const apply=m=>{
    document.documentElement.classList.toggle('light',m==='light'); 
    localStorage.setItem(k,m); 
    document.getElementById('theme').innerHTML = m==='light' ? icon('moon') : icon('sun');
  }
  apply(localStorage.getItem(k)||'dark');
  document.getElementById('theme').onclick=()=>apply(document.documentElement.classList.contains('light')?'dark':'light');
})();

/* ===== Helpers ===== */
const isPrivateNet = (h)=>/^(localhost|127\.0\.0\.1|10\.\d+\.\d+\.\d+|192\.168\.\d+\.\d+|172\.(1[6-9]|2\d|3[01])\.\d+\.\d+)$/.test(h);
const DEF_API = ()=>{
  // Si on est dans Electron (file://) ou si hostname est vide, utiliser localhost
  const host = (location.hostname && location.hostname !== '') ? location.hostname : 'localhost';
  return 'http://' + host + ':3005';
};
function getAPI(){ return (localStorage.getItem('efoot.api')||DEF_API()).replace(/\/+$/,''); }
function setAPI(v){ localStorage.setItem('efoot.api', v.replace(/\/+$/,'')); }

function showErr(msg){ document.getElementById('err').textContent=msg||''; }
function showBoot(msg){ document.getElementById('boot').textContent=msg||''; }
function setBusy(v){
  const b=document.getElementById('submit');
  b.disabled=!!v; b.textContent=v?'Connexion…':'Se connecter';
}

async function safeFetch(url, opt={}, ms=8000){
  const ctrl = new AbortController();
  const t = setTimeout(()=>ctrl.abort(), ms);
  try{ return await fetch(url, {signal:ctrl.signal, ...opt}); }
  finally{ clearTimeout(t); }
}

/* Validation du token avant redirection */
async function validateSession(){
  const token = localStorage.getItem('efoot.token');
  const expAt = +localStorage.getItem('efoot.expAt') || 0;
  if(!token || Date.now()>=expAt) return null;
  try{
    const r=await safeFetch(getAPI()+'/auth/me',{headers:{Authorization:'Bearer ' + token}},5000);
    if(!r || !r.ok) return null;
    const d=await r.json();
    return (d.user && d.user.role) ? d.user.role : (localStorage.getItem('efoot.role')||'member');
  }catch(_){ return null; }
}

function goAfterLogin(role){
  const r=(role||'member').toLowerCase();
  location.replace(r==='admin' ? 'Accueil.html' : 'Panel-Membre.html');
}

/* Bootstrap si session existe déjà */
(async function bootstrapIfAlreadyLogged(){
  if(sessionStorage.getItem('_redirecting')) return;

  const token = localStorage.getItem('efoot.token');
  const expAt = +localStorage.getItem('efoot.expAt') || 0;
  if(!token || expAt <= 0 || Date.now()>=expAt) return;

  setBusy(true); showErr(''); showBoot('Vérification...');

  const role = await validateSession();
  if(role){
    showBoot('');
    goAfterLogin(role);
  }else{
    localStorage.removeItem('efoot.token');
    localStorage.removeItem('efoot.expAt');
    localStorage.removeItem('efoot.role');
    setBusy(false);
    showBoot('');
  }
})();

/* Afficher/masquer le mot de passe */
(function(){
  const btn=document.getElementById('togglePwd');
  btn.innerHTML=icon('eye');
  document.getElementById('cfgBtn').innerHTML=icon('settings');
  btn?.addEventListener('click', ()=>{
    const i=document.getElementById('pwd');
    if(!i) return;
    const t=i.getAttribute('type')==='password'?'text':'password';
    i.setAttribute('type', t);
    btn.innerHTML=(t==='password')?icon('eye'):icon('eyeOff');
  });
})();

/* Soumission du formulaire de connexion */
document.getElementById('f').addEventListener('submit', async (e)=>{
  e.preventDefault();
  showErr(''); showBoot(''); setBusy(true);

  let email=(document.getElementById('email').value||'').trim();
  const password=document.getElementById('pwd').value||'';
  if(email && !email.includes('@')) email = email+'@gz.local';

  try{
    const r=await safeFetch(getAPI()+'/auth/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,password})
    }, 12000);

    const d=await r.json().catch(()=>({}));
    if(!r || !r.ok){ throw new Error('Identifiant ou mot de passe incorrect'); }

    const token=d.token;
    const role=(d.user&&d.user.role)||'member';
    const expHours = Number(d.expHours||1);
    localStorage.setItem('efoot.token', token);
    localStorage.setItem('efoot.role', role.toLowerCase());
    localStorage.setItem('efoot.expAt', String(Date.now()+expHours*3600*1000));

    // Redirection immédiate
    showBoot('Connexion réussie...');
    goAfterLogin(role);

  }catch(err){
    console.error(err);
    showErr(err.message||'Erreur réseau');
    setBusy(false); showBoot('');
  }
});

/* ===== Config API ===== */
(function(){
  const dlg=document.getElementById('cfg');
  const btn=document.getElementById('cfgBtn');
  const input=document.getElementById('apiUrl');
  const msg=document.getElementById('cfgMsg');

  btn.onclick=()=>{ input.value=getAPI(); msg.textContent='—'; dlg.showModal(); };
  document.getElementById('cfgClose').onclick=()=>dlg.close();
  document.getElementById('cfgSave').onclick=()=>{ setAPI(input.value.trim()); msg.textContent='Sauvé.'; };
  document.getElementById('cfgTest').onclick=async()=>{
    msg.textContent='Test…';
    try{
      const u=(input.value||'').trim().replace(/\/+$/,'')||DEF_API();
      const r=await safeFetch(u+'/health',{cache:'no-store'},6000);
      if(!r || !r.ok) throw 0;
      msg.innerHTML='<i data-lucide="check-circle" style="width:14px;height:14px;vertical-align:middle;color:#22c55e"></i> OK';
      lucide.createIcons({nodes:[msg]});
    }catch(_){
      msg.innerHTML='<i data-lucide="x-circle" style="width:14px;height:14px;vertical-align:middle;color:#ef4444"></i> Échec — vérifie l\'URL (CORS/SSL)';
      lucide.createIcons({nodes:[msg]});
    }
  };

})();
</script>

<footer style="text-align:center; color:var(--muted); margin:12px 0">Copyright © -GOUZEPE GAMING CLUB 2025</footer>
</body>
</html>
