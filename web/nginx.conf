server {
    listen 80;
    server_name _;

    charset utf-8;
    root /usr/share/nginx/html;
    index login.html;

    # Servir les fichiers statiques (HTML, CSS, JS, images)
    location / {
        try_files $uri $uri/ /Accueil.html;
    }

    # Cache sur les assets (images, fonts, icons)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Désactiver le cache sur les HTML (toujours la version fraîche)
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }
}
