<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>GOUZEPE — Admin Joueurs</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="common.css">
<link rel="stylesheet" href="mobile.css">
<script defer src="common.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<meta name="color-scheme" content="dark light">

<style>
  .dlg-h{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700}
  .dlg-b{padding:14px 16px;display:grid;gap:10px}
  .dlg-f{padding:14px 16px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
  .keepcase{text-transform:none !important}

  /* Pastille présence */
  .dot{display:inline-block;width:10px;height:10px;border-radius:50%;background:#64748b;margin-right:6px}
  .dot.online{background:#22c55e}

  /* Badges */
  .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase}
  .badge.mem{background:rgba(37,99,235,.15);color:#60a5fa;border:1px solid rgba(37,99,235,.3)}
  .badge.inv{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.3)}
</style>
</head>

<!-- ======= Modal édition joueur (+ liaison compte) ======= -->
<dialog id="editDlg">
  <div class="dlg-h">Modifier le joueur</div>
  <div class="dlg-b">
    <label>ID (clé) - <span class="muted">Attention : modifier l'ID affectera toutes les références</span></label>
    <input id="e_pid" placeholder="ex: CBlacks_GZ">
    <input id="e_pid_old" type="hidden">

    <label>Nom</label>
    <input id="e_name" placeholder="Nom complet">

    <label>Statut</label>
    <select id="e_role">
      <option value="MEMBRE">MEMBRE</option>
      <option value="INVITE">INVITE</option>
    </select>

    <hr style="border:none;border-top:1px solid var(--border)">
    <div class="muted">Compte membre associé (pour connexion <b>nom@gz</b>)</div>
    <label>Email (par défaut : nom@gz.local)</label>
    <input id="e_email" placeholder="ex: zidane@gz.local">
    <label>Nouveau mot de passe (optionnel)</label>
    <input id="e_pwd" type="password" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢">

    <div id="editMsg" class="muted">—</div>
  </div>
  <div class="dlg-f">
    <button class="btn danger" id="unlinkUser" style="display:none" title="Dissocier le compte utilisateur">Détacher</button>
    <button class="btn" id="editCancel" title="Annuler et fermer sans enregistrer">Annuler</button>
    <button class="btn" id="linkUser" title="Lier ou mettre à jour le compte membre associé">Lier/MAJ compte</button>
    <button class="btn primary" id="editSave" title="Enregistrer les modifications du joueur">Enregistrer</button>
  </div>
</dialog>

<body>
  <!-- ===== TOP ===== -->
  <header class="top" id="topbar">
    <a class="brand" href="./Accueil.html" aria-label="Accueil GOUZEPE">
      <img id="clubLogo" class="logo" src="assets/icons/apple-touch-icon.png" alt="Logo">
      <div class="brand-title">
        <h1>GOUZEPE eFOOTBALL</h1>
        <div class="season-sub"><span id="season-text" style="color: #16a34a; font-weight: bold;">Saison</span></div>
      </div>
    </a>

    <button id="menuToggle" class="btn ghost" aria-controls="menu" aria-expanded="false" title="Ouvrir le menu de navigation"><i data-lucide="menu"></i> Menu</button>
    <nav class="nav" aria-label="Navigation principale">
      <div id="menu" class="menu">
        <a href="./Accueil.html"><i data-lucide="home"></i> Accueil</a>
        <a href="./Duel.html"><i data-lucide="swords"></i> Duel</a>
        <a href="./Classement-general.html"><i data-lucide="bar-chart-2"></i> Classements</a>
        <a href="./Panel-Membre.html"><i data-lucide="user"></i> Mon espace</a>
        <a class="adminNav" href="./Admin-Joueurs.html" style="display:none"><i data-lucide="users"></i> Admin-Joueurs</a>
        <a class="adminNav" href="./Admin-Utilisateurs.html" style="display:none"><i data-lucide="shield"></i> Admin Utilisateurs</a>
        <a class="adminNav" href="./Admin-Sauvegardes.html" style="display:none"><i data-lucide="database"></i> Sauvegardes</a>
        <button id="logoutBtn" class="btn ghost danger" type="button" title="Se déconnecter de votre compte"><i data-lucide="log-out"></i></button>
      </div>
    </nav>

    <div class="spacer"></div>

    <button id="themeBtn" class="btn ghost" title="Thème clair/sombre">
      <i data-lucide="sun" class="theme-icon-sun"></i>
      <i data-lucide="moon" class="theme-icon-moon" style="display: none;"></i>
    </button>



  </header>

<div class="wrap">
  <section class="card adminOnly" style="margin-top:12px">
    <h3 style="margin:6px 0">Créer / modifier un joueur</h3>
    <div class="row">
      <input id="pid" placeholder="ID (ex: CBlacks_GZ)" style="min-width:160px">
      <input id="pname" placeholder="Nom complet" style="min-width:220px;flex:1">
      <select id="prole">
        <option value="MEMBRE">MEMBRE</option>
        <option value="INVITE">INVITE</option>
      </select>
      <button id="addBtn" class="btn primary" title="Créer un nouveau joueur">Ajouter</button>
    </div>
    <div id="msg" class="muted" style="margin-top:6px"></div>
  </section>

  <section class="card" style="margin-top:12px">
    <div class="row" style="justify-content:space-between;align-items:center">
      <h3 style="margin:6px 0">Joueurs enregistrés</h3>
      <div class="row">
        <input id="q" placeholder="Rechercher (ID/nom)..." />
        <button id="reload" class="btn" title="Recharger la liste des joueurs depuis le serveur">Rafraîchir</button>
      </div>
    </div>
    <div class="table-wrap" style="overflow-x:auto;-webkit-overflow-scrolling:touch">
      <table style="text-align: center;">
        <thead><tr><th>ID</th><th>Nom</th><th>Status</th><th>Compte</th><th class="adminOnly">Actions</th></tr></thead>
        <tbody id="list"></tbody>
      </table>
    </div>
  </section>
</div>

<script>

/* ===== Chargement joueurs + présence ===== */
let players=[];
let ONLINE = new Set();

async function loadPresence(){
  try{
    const r = await fetch(`${API}/presence/players`, { headers:{Authorization:`Bearer ${window.token}`} });
    const d = await r.json();
    ONLINE = new Set(d.online || []);
  }catch(_){ ONLINE = new Set(); }
}
async function load(){
  try{
    const r=await fetch(`${API}/players`,{headers:{'Authorization':`Bearer ${window.token}`}});
    const d=await r.json(); players=d.players||[];
    await loadPresence();
    render();
    document.getElementById('msg').textContent='';
  }catch(e){
    document.getElementById('msg').textContent='Impossible de charger les joueurs';
  }
}
function render(){
  const q=(document.getElementById('q').value||'').toLowerCase();
  const rows=players.filter(p=>(p.player_id||'').toLowerCase().includes(q)||(p.name||'').toLowerCase().includes(q));
  const tb=document.getElementById('list'); tb.innerHTML='';
  const isAdmin = window.role === 'admin';
  rows.forEach(p=>{
    const tr=document.createElement('tr');
    const online = ONLINE.has(p.player_id);
    tr.innerHTML =
      `<td>${p.player_id}</td>
       <td>${p.name||''}</td>
       <td><span class="badge ${p.role==='INVITE'?'inv':'mem'}">${p.role||'MEMBRE'}</span></td>
       ${
         isAdmin
         ? `<td>${p.user_email ? '<i data-lucide="check" style="width:14px;height:14px;vertical-align:middle"></i> '+p.user_email : '—'}</td>`
         : `<td>${online ? '<span class="dot online"></span> En ligne' : '<span class="dot"></span> Hors ligne'}</td>`
       }
       ${isAdmin ? `<td>
          <button class="btn" data-edit="${p.player_id}">Modifier</button>
          <button class="btn danger" data-del="${p.player_id}">Supprimer</button>
        </td>` : `<td class="adminOnly"></td>`}`;
    tb.appendChild(tr);
  });
  if(window.lucide) lucide.createIcons();
}

/* ===== CRUD ===== */
async function write(method,url,body){
  const opt={method,headers:{'Authorization':`Bearer ${window.token}`}};
  if(body){opt.headers['Content-Type']='application/json';opt.body=JSON.stringify(body);}
  const r=await fetch(url,opt); const d=await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(d.error||`Erreur ${r.status}`);
  return d;
}
document.getElementById('addBtn').onclick=async ()=>{
  const player_id=document.getElementById('pid').value.trim();
  const name=document.getElementById('pname').value.trim();
  const roleSel=document.getElementById('prole').value||'MEMBRE';
  if(!player_id||!name){ document.getElementById('msg').textContent='ID et Nom requis'; return; }
  document.getElementById('msg').textContent='Enregistrement…';
  try{ await write('POST',`${API}/admin/players`,{player_id,name,role:roleSel});
       document.getElementById('msg').textContent='OK'; await load();
  }catch(e){ document.getElementById('msg').textContent=e.message||'Erreur'; }
};
document.getElementById('list').addEventListener('click',async (e)=>{
  const id = e.target.dataset.edit || e.target.dataset.del;
  if(!id) return;
  if(e.target.dataset.edit){
    openEditPlayer(id);
  }else if(e.target.dataset.del){
    if(!confirm('Supprimer ce joueur ?')) return;
    try{ await write('DELETE',`${API}/admin/players/${encodeURIComponent(id)}`); await load(); }
    catch(err){ alert(err.message||'Erreur'); }
  }
});
document.getElementById('reload').onclick=load;
document.getElementById('q').addEventListener('input',render);

/* ===== Addition modale (joueur + liaison compte) ===== */
function slugifyNameToEmail(name){
  const domain = (localStorage.getItem('efoot.emailDomain')||'gz.local');
  const loc = (name||'')
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .toLowerCase().replace(/[^a-z0-9]+/g,'.').replace(/\.+/g,'.').replace(/^\.|\.$/g,'');
  return (loc||'membre')+'@'+domain;
}
async function openEditPlayer(id){
  const p=players.find(x=>x.player_id===id); if(!p) return;
  const dlg   = document.getElementById('editDlg');
  const pid   = document.getElementById('e_pid');
  const pidOld= document.getElementById('e_pid_old');
  const pname = document.getElementById('e_name');
  const prole = document.getElementById('e_role');
  const pemail= document.getElementById('e_email');
  const ppwd  = document.getElementById('e_pwd');
  const msg   = document.getElementById('editMsg');
  const btnUnlink = document.getElementById('unlinkUser');

  pid.value   = p.player_id || '';
  pidOld.value= p.player_id || '';
  pname.value = p.name || '';
  prole.value = (p.role || 'MEMBRE').toUpperCase();
  pemail.value= p.user_email || slugifyNameToEmail(p.name||p.player_id);
  ppwd.value  = '';
  msg.textContent = '—';
  
  // Afficher le bouton détacher si un email est déjà lié
  btnUnlink.style.display = p.user_email ? 'inline-flex' : 'none';
  dlg.showModal();

  document.getElementById('editCancel').onclick=()=>dlg.close();

  document.getElementById('editSave').onclick = async ()=>{
    try{
      const newId = pid.value.trim();
      const oldId = pidOld.value.trim();

      if(!newId) {
        msg.textContent='ID requis';
        return;
      }

      const body = {
        name: pname.value.trim(),
        role: prole.value
      };

      // Si l'ID a changé, inclure le nouveau player_id
      if(newId !== oldId) {
        if(!confirm(`âš ï¸ Modifier l'ID "${oldId}" â†’ "${newId}"?\nCela affectera toutes les références (matchs, stats, etc.)`)) {
          return;
        }
        body.player_id = newId;
      }

      msg.textContent='Mise à jour…';
      await write('PUT',`${API}/admin/players/${encodeURIComponent(oldId)}`, body);
      msg.textContent='OK';
      dlg.close(); await load();
    }catch(e){ msg.textContent=e.message||'Erreur'; }
  };

  document.getElementById('linkUser').onclick = async ()=>{
    try{
      msg.textContent='Liaison du compte…';
      const payload={ email: pemail.value.trim(), password: ppwd.value.trim()||undefined };
      const r = await write('POST', `${API}/admin/players/${encodeURIComponent(id)}/attach_user`, payload);
      msg.textContent='Compte lié : '+(r.user?.email||pemail.value.trim());
      await load();
    }catch(e){ msg.textContent=e.message||'Erreur'; }
  };

  btnUnlink.onclick = async () => {
    if(!confirm('Voulez-vous vraiment dissocier le compte utilisateur de ce joueur ?')) return;
    try {
      msg.textContent = 'Dissociation...';
      await write('POST', `${API}/admin/players/${encodeURIComponent(id)}/detach_user`);
      msg.textContent = 'Compte dissocié';
      dlg.close(); await load();
    } catch(e) { msg.textContent = e.message || 'Erreur'; }
  };
}

/* init */
document.addEventListener('DOMContentLoaded', load);

</script>
