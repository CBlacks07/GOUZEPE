<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>GOUZEPE - Admin Tournois</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="common.css">
<link rel="stylesheet" href="mobile.css">
<script defer src="common.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  .wrap{max-width:none!important;padding:12px 20px!important}
  .grid{display:grid;grid-template-columns:360px 1fr;gap:12px;margin-top:12px}
  @media(max-width:1040px){.grid{grid-template-columns:1fr}}
  .players{max-height:360px;overflow:auto;border:1px solid var(--border);border-radius:10px;padding:8px;background:var(--card)}
  .player-item{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center;padding:6px 4px;border-bottom:1px solid var(--border)}
  .player-item:last-child{border-bottom:0}
  .rounds{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(220px,1fr);gap:12px;overflow:auto;padding-bottom:4px}
  .round{border:1px solid var(--border);border-radius:12px;background:var(--card);padding:10px;min-width:0}
  .round h4{margin:0 0 8px;font-size:13px;color:var(--muted);text-transform:uppercase}
  .match{border:1px solid var(--border);border-radius:10px;padding:8px;margin-bottom:8px;transition:box-shadow .15s,border-color .15s}
  .match:last-child{margin-bottom:0}
  .match:hover{box-shadow:0 3px 10px rgba(0,0,0,.18)}
  .match.m-ready{border-color:rgba(22,163,74,.5)}
  .match.m-completed{opacity:.8}
  .line{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:4px 0}
  .line.win{font-weight:700;color:#86efac;background:rgba(22,163,74,.1);border-radius:5px;padding:4px 6px}
  .score-val{font-weight:600;min-width:22px;text-align:center;background:rgba(255,255,255,.07);border-radius:5px;padding:1px 6px;font-variant-numeric:tabular-nums}
  .score-val.win-score{background:rgba(22,163,74,.22);color:#86efac}
  .status{display:inline-flex;padding:2px 8px;border-radius:999px;border:1px solid var(--border);font-size:11px;text-transform:uppercase}
  .status.live{background:rgba(22,163,74,.15);color:#86efac}
  .status.draft{background:rgba(245,158,11,.15);color:#fcd34d}
  .status.completed{background:rgba(59,130,246,.16);color:#93c5fd}
  .status.archived{background:rgba(100,116,139,.18);color:#cbd5e1}
  .table-wrap{overflow:auto}
  /* Verrou participants */
  #participantsSection.locked{opacity:.42;pointer-events:none;user-select:none;transition:opacity .2s}
  .lock-notice{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.35);border-radius:8px;padding:8px 12px;font-size:12px;color:#fcd34d;margin-bottom:8px;display:flex;align-items:center;gap:8px}
  /* Participant list (Challonge style) */
  .participant-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid var(--border);border-radius:8px;margin-bottom:4px;background:rgba(255,255,255,.02);transition:border-color .15s}
  .participant-item:hover{border-color:rgba(99,102,241,.35);background:rgba(99,102,241,.04)}
  .participant-seed{width:22px;text-align:center;font-size:11px;font-weight:700;color:var(--muted);flex-shrink:0}
  .participant-name{flex:1;font-size:13px;color:var(--text);font-weight:500}
  .participant-rm{background:none;border:none;color:var(--muted);cursor:pointer;padding:2px 6px;border-radius:4px;font-size:15px;line-height:1;flex-shrink:0}
  .participant-rm:hover{color:#f87171;background:rgba(248,113,113,.12)}
  .participants-empty{color:var(--muted);font-size:12px;text-align:center;padding:20px 0}
  /* Live pulse */
  @keyframes pulse-live{0%,100%{opacity:1}50%{opacity:.5}}
  .status.live{animation:pulse-live 2s ease-in-out infinite}
  /* Winner animation */
  @keyframes winner-in{from{opacity:0;transform:scale(.9) translateY(-4px)}to{opacity:1;transform:none}}
  .winner-banner{animation:winner-in .35s ease;background:rgba(22,163,74,.12);border:1px solid rgba(22,163,74,.3);border-radius:10px;padding:10px 16px;font-weight:700;color:#86efac;display:flex;align-items:center;gap:8px;margin-bottom:8px}
  /* Inline score editing */
  .match .inline-edit{display:none}
  .match.editing .inline-edit{display:flex;flex-direction:column;gap:4px;padding-top:6px;border-top:1px solid var(--border);margin-top:6px}
  .score-val.clickable{cursor:pointer;outline:1px dashed rgba(59,130,246,.55)}
  .match.editing .score-val.clickable{outline-color:rgba(22,163,74,.65)}
  .match.m-completed .score-val.clickable{outline-color:rgba(245,158,11,.55)}
  .match.m-completed.editing .score-val.clickable{outline-color:rgba(245,158,11,.8)}
  .rr-card.m-completed .rr-scores.clickable{outline-color:rgba(245,158,11,.55)}
  .inline-edit-row{display:flex;align-items:center;gap:8px}
  .inline-edit-row span{flex:1;font-size:13px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .score-in{width:64px;text-align:center;padding:4px 6px;font-size:14px}
  /* DE bracket sections */
  .bracket-section{margin-bottom:18px}
  .section-label{margin:0 0 10px;font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;display:flex;align-items:center;gap:7px}
  .section-label::before{content:'';display:inline-block;width:10px;height:3px;border-radius:2px;background:currentColor;flex-shrink:0}
  .wb-label{color:#60a5fa}
  .lb-label{color:#f59e0b}
  .gf-label{color:#86efac}
  /* LB: compact fixed-width columns */
  .lb-rounds{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px}
  .lb-rounds .round{min-width:190px;width:190px;flex-shrink:0}
  /* GF: narrow card */
  .gf-section{border:1px solid rgba(22,163,74,.28);border-radius:14px;padding:14px 16px;background:rgba(22,163,74,.05)}
  .gf-match-wrap{display:inline-block;min-width:280px;max-width:380px}
  .gf-match-wrap .match{margin-bottom:0;border-color:rgba(22,163,74,.4);background:rgba(22,163,74,.04)}
  /* RR compact cards */
  .rr-matches{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:5px;margin-top:4px}
  .rr-card{display:grid;grid-template-columns:1fr max-content 1fr;align-items:center;gap:8px;padding:6px 10px;border:1px solid var(--border);border-radius:8px;transition:border-color .15s}
  .rr-card.m-ready{border-color:rgba(22,163,74,.4)}
  .rr-card.m-completed{opacity:.8}
  .rr-name{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100px}
  .rr-name-right{text-align:right}
  .rr-win{font-weight:700;color:#86efac}
  .rr-scores{display:flex;align-items:center;gap:5px;justify-content:center;padding:3px 8px;background:rgba(255,255,255,.05);border-radius:6px;flex-shrink:0}
  .rr-scores.clickable{cursor:pointer;outline:1px dashed rgba(59,130,246,.55)}
  .rr-scores.clickable:hover{background:rgba(59,130,246,.12)}
  .rr-dot{color:var(--muted);font-size:11px}
  .rr-card .inline-edit{display:none;grid-column:1/-1;padding-top:6px;border-top:1px solid var(--border);margin-top:4px;flex-direction:column;gap:4px}
  .rr-card.editing .inline-edit{display:flex}
  .rr-edit-row{display:flex;align-items:center;gap:8px;justify-content:center}
  .standings-table{width:100%;font-size:13px;border-collapse:collapse}
  .standings-table th{font-weight:600;color:var(--muted);padding:4px 8px;text-align:center;border-bottom:1px solid var(--border)}
  .standings-table td{padding:4px 8px;text-align:center}
  .standings-table td:nth-child(2){text-align:left}
  .standings-table tbody tr:nth-child(even){background:rgba(255,255,255,.03)}
  .standings-table tbody tr:first-child td{color:#86efac;font-weight:600}
  /* Bracket tree */
  .bt-outer{overflow-x:auto;overflow-y:visible;padding:8px 4px 12px}
  .bt-wrap{position:relative;overflow:visible}
  .bt-svg{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}
  .bt-match{position:absolute;overflow:visible}
  .bt-match .match{margin-bottom:0;width:160px}
  .bt-match.open{z-index:20}
  .bt-match.open .match{background:var(--card);box-shadow:0 8px 24px rgba(0,0,0,.55)}
  .bt-label{position:absolute;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);text-align:center;white-space:nowrap}
  /* Groups + Knockout */
  .groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-top:4px}
  .group-section{border:1px solid var(--border);border-radius:12px;padding:10px;background:rgba(255,255,255,.02)}
  .group-label{margin:0 0 8px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#a78bfa}
  .standings-table .qualifier-row td:first-child{color:#a78bfa;font-weight:700}
</style>
</head>

<script>
const API_BASE = (localStorage.getItem('efoot.api') || ('http://' + (location.hostname || 'localhost') + ':3005')).replace(/\/+$/,'');
const TOKEN = localStorage.getItem('efoot.token') || '';
let tournaments = [];
let bundle = null;
let participantNames = []; // local staging list

function esc(x){ return String(x == null ? '' : x).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function hd(method='GET', body){
  const o = { method, headers: { Authorization: 'Bearer '+TOKEN, 'Content-Type':'application/json' } };
  if (body !== undefined) o.body = JSON.stringify(body);
  return o;
}
async function api(path, opt){
  const r = await fetch(API_BASE + path, opt || hd());
  if (r.status === 401){ location.replace('login.html'); throw new Error('401'); }
  const d = await r.json().catch(()=>({}));
  if (!r.ok) throw new Error(d.error || ('HTTP '+r.status));
  return d;
}
function statusClass(st){ return ['live','draft','completed','archived'].includes(st) ? st : ''; }
function selectedTournamentId(){
  const v = Number(document.getElementById('tourSel').value || 0);
  return Number.isInteger(v) && v > 0 ? v : null;
}
/* ── Selects ── */
function renderTournamentSelect(){
  const sel = document.getElementById('tourSel');
  const current = sel.value;
  sel.innerHTML = '<option value="">-- Choisir --</option>';
  tournaments.forEach(t => {
    const o = document.createElement('option');
    o.value = t.id;
    o.textContent = `${t.name} (${t.status})`;
    sel.appendChild(o);
  });
  if (tournaments.some(t => String(t.id) === current)) sel.value = current;
  else if (tournaments.length) sel.value = String(tournaments[0].id);
}

/* ── Participants list (Challonge style) ── */
function renderParticipantsList(){
  const box = document.getElementById('participantsList');
  const count = document.getElementById('pCount');
  if (!box) return;
  if (count) count.textContent = participantNames.length ? `(${participantNames.length})` : '';
  if (!participantNames.length){
    box.innerHTML = '<div class="participants-empty">Aucun participant — ajoutez des noms ci-dessus</div>';
    return;
  }
  box.innerHTML = participantNames.map((name, i) => `
    <div class="participant-item" data-idx="${i}">
      <span class="participant-seed">${i+1}</span>
      <span class="participant-name">${esc(name)}</span>
      <button class="participant-rm" data-idx="${i}" title="Retirer" aria-label="Retirer ${esc(name)}">×</button>
    </div>`).join('');
  applyLockState();
}

/* ── Match card HTML (shared) ── */
function matchCardHtml(m){
  const s1 = Number.isInteger(m.score_p1) ? m.score_p1 : '–';
  const s2 = Number.isInteger(m.score_p2) ? m.score_p2 : '–';
  const w1 = m.winner_participant_id && m.winner_participant_id === m.p1_participant_id;
  const w2 = m.winner_participant_id && m.winner_participant_id === m.p2_participant_id;
  const mCls = m.status === 'completed' ? 'm-completed' : (m.p1_participant_id && m.p2_participant_id ? 'm-ready' : '');
  const editable = !!(m.p1_participant_id && m.p2_participant_id);
  const isCorrection = m.status === 'completed';
  const clickCls = editable ? ' clickable' : '';
  const clickTitle = editable ? (isCorrection ? 'Cliquer pour corriger le score' : 'Cliquer pour saisir le score') : '';
  const editPart = editable ? `
    <div class="inline-edit">
      <div class="inline-edit-row"><span>${esc(m.p1_name||'TBD')}</span><input class="score-in" type="number" min="0" placeholder="0" value="${Number.isInteger(m.score_p1)?m.score_p1:''}"></div>
      <div class="inline-edit-row"><span>${esc(m.p2_name||'TBD')}</span><input class="score-in" type="number" min="0" placeholder="0" value="${Number.isInteger(m.score_p2)?m.score_p2:''}"></div>
      <div class="row" style="gap:6px;margin-top:4px">
        <button class="btn ${isCorrection?'warn':'primary'} btn-confirm-score" style="flex:1">${isCorrection?'✎ Corriger':'✓ Valider'}</button>
        <button class="btn btn-cancel-score">✕</button>
      </div>
    </div>` : '';
  return `<div class="match ${mCls}" data-match-id="${m.id}">
    <div class="line ${w1?'win':''}"><span>${esc(m.p1_name||'TBD')}</span><span class="score-val ${w1?'win-score':''}${clickCls}" title="${clickTitle}">${s1}</span></div>
    <div class="line ${w2?'win':''}"><span>${esc(m.p2_name||'TBD')}</span><span class="score-val ${w2?'win-score':''}${clickCls}" title="${clickTitle}">${s2}</span></div>
    ${editPart}
  </div>`;
}

/* ── Bracket tree constants + renderer ── */
const BT_H=62,BT_G=12,BT_U=74,BT_W=160,BT_C=36,BT_PAD=26;
function btCY(r,s){ return (s+.5)*Math.pow(2,r)*BT_U+BT_PAD; }
function btTY(r,s){ return btCY(r,s)-BT_H/2; }
function btLX(r){ return r*(BT_W+BT_C); }

function renderBracketTree(container,matches,labelFn){
  const rm=new Map();
  matches.forEach(m=>{if(!rm.has(m.round_no))rm.set(m.round_no,[]);rm.get(m.round_no).push(m);});
  const rks=[...rm.keys()].sort((a,b)=>a-b);
  if(!rks.length){container.innerHTML='<div class="muted">Bracket vide.</div>';return;}
  const R=rks.length,S0=rm.get(rks[0]).length;
  const tW=R*(BT_W+BT_C)-BT_C,tH=S0*BT_U+BT_PAD;
  let lines='';
  for(let ri=0;ri<R-1;ri++){
    const cur=rm.get(rks[ri]).sort((a,b)=>a.slot_no-b.slot_no);
    for(let si=0;si<cur.length;si+=2){
      const cy0=btCY(ri,si),hasSib=si+1<cur.length;
      const cy1=hasSib?btCY(ri,si+1):cy0;
      const cyP=btCY(ri+1,Math.floor(si/2));
      const rx=btLX(ri)+BT_W,mx=rx+BT_C/2,lx=btLX(ri+1);
      lines+=`<line x1="${rx}" y1="${cy0}" x2="${mx}" y2="${cy0}"/>`;
      if(hasSib){lines+=`<line x1="${rx}" y1="${cy1}" x2="${mx}" y2="${cy1}"/><line x1="${mx}" y1="${cy0}" x2="${mx}" y2="${cy1}"/>`;}
      lines+=`<line x1="${mx}" y1="${cyP}" x2="${lx}" y2="${cyP}"/>`;
    }
  }
  let html='';
  for(let ri=0;ri<R;ri++){
    const lbl=labelFn?labelFn(rks[ri],ri,rks):`R${rks[ri]}`;
    html+=`<div class="bt-label" style="left:${btLX(ri)}px;top:4px;width:${BT_W}px">${esc(lbl)}</div>`;
  }
  for(let ri=0;ri<R;ri++){
    rm.get(rks[ri]).sort((a,b)=>a.slot_no-b.slot_no).forEach((m,si)=>{
      html+=`<div class="bt-match" data-match-id="${m.id}" style="left:${btLX(ri)}px;top:${btTY(ri,si)}px;width:${BT_W}px">${matchCardHtml(m)}</div>`;
    });
  }
  container.innerHTML=`<div class="bt-outer"><div class="bt-wrap" style="width:${tW}px;height:${tH}px">
    <svg class="bt-svg" width="${tW}" height="${tH}" viewBox="0 0 ${tW} ${tH}"><g stroke="rgba(100,116,139,.4)" stroke-width="1.5" fill="none">${lines}</g></svg>
    ${html}
  </div></div>`;
}

/* ── SE bracket ── */
function renderBracketSE(){
  const el=document.getElementById('bracket');
  el.className='';
  const matches=bundle.matches||[];
  if(!matches.length){el.innerHTML='<div class="muted">Bracket vide.</div>';return;}
  renderBracketTree(el,matches,(rNo,idx,arr)=>
    idx===arr.length-1?'Finale':(idx===arr.length-2?'Demi-finales':`Round ${rNo}`));
}

/* ── DE bracket ── */
function renderBracketDE(){
  const matches=bundle.matches||[];
  const wb=matches.filter(m=>m.bracket_side==='W');
  const lb=matches.filter(m=>m.bracket_side==='L');
  const gf=matches.filter(m=>m.bracket_side==='GF');
  const el=document.getElementById('bracket');
  el.className='';
  el.innerHTML='';
  if(!matches.length){el.innerHTML='<div class="muted">Bracket vide.</div>';return;}
  if(wb.length){
    const sec=document.createElement('div');sec.className='bracket-section';
    sec.innerHTML='<p class="section-label wb-label">Winner Bracket</p>';
    const tc=document.createElement('div');
    renderBracketTree(tc,wb,(rNo,idx,ka)=>{
      if(idx===ka.length-1)return'WB Finale';
      if(idx===ka.length-2)return'WB Demi-finales';
      return`WB Round ${rNo}`;
    });
    sec.appendChild(tc);el.appendChild(sec);
  }
  if(lb.length){
    const mp=new Map();
    lb.forEach(m=>{if(!mp.has(m.round_no))mp.set(m.round_no,[]);mp.get(m.round_no).push(m);});
    const lbHtml=[...mp.keys()].sort((a,b)=>a-b).map((rNo,idx,ka)=>{
      const rs=mp.get(rNo).sort((a,b)=>a.slot_no-b.slot_no);
      return`<div class="round"><h4>${esc(idx===ka.length-1?'LB Finale':`LB R${rNo-10}`)}</h4>${rs.map(m=>matchCardHtml(m)).join('')}</div>`;
    }).join('');
    const sec=document.createElement('div');sec.className='bracket-section';
    sec.innerHTML=`<p class="section-label lb-label">Loser Bracket</p><div class="lb-rounds">${lbHtml}</div>`;
    el.appendChild(sec);
  }
  if(gf.length){
    const sec=document.createElement('div');sec.className='bracket-section gf-section';
    sec.innerHTML=`<p class="section-label gf-label">Grande Finale</p><div class="gf-match-wrap">${gf.map(m=>matchCardHtml(m)).join('')}</div>`;
    el.appendChild(sec);
  }
}

/* ── Compact horizontal card for Round Robin ── */
function matchCardRR(m){
  const s1 = Number.isInteger(m.score_p1) ? m.score_p1 : '–';
  const s2 = Number.isInteger(m.score_p2) ? m.score_p2 : '–';
  const w1 = m.winner_participant_id && m.winner_participant_id === m.p1_participant_id;
  const w2 = m.winner_participant_id && m.winner_participant_id === m.p2_participant_id;
  const mCls = m.status === 'completed' ? 'm-completed' : (m.p1_participant_id && m.p2_participant_id ? 'm-ready' : '');
  const editable = !!(m.p1_participant_id && m.p2_participant_id);
  const isCorrection = m.status === 'completed';
  const scoreZone = editable
    ? `<div class="rr-scores clickable" title="${isCorrection?'Cliquer pour corriger':'Cliquer pour saisir'}"><span class="score-val ${w1?'win-score':''}">${s1}</span><span class="rr-dot">·</span><span class="score-val ${w2?'win-score':''}">${s2}</span></div>`
    : `<div class="rr-scores"><span class="score-val ${w1?'win-score':''}">${s1}</span><span class="rr-dot">·</span><span class="score-val ${w2?'win-score':''}">${s2}</span></div>`;
  const editPart = editable ? `
    <div class="inline-edit">
      <div class="rr-edit-row">
        <span style="flex:1;text-align:right;font-size:12px;color:var(--muted)">${esc(m.p1_name||'TBD')}</span>
        <input class="score-in" type="number" min="0" placeholder="0" value="${Number.isInteger(m.score_p1)?m.score_p1:''}" style="width:52px">
        <span class="rr-dot" style="font-size:15px">·</span>
        <input class="score-in" type="number" min="0" placeholder="0" value="${Number.isInteger(m.score_p2)?m.score_p2:''}" style="width:52px">
        <span style="flex:1;font-size:12px;color:var(--muted)">${esc(m.p2_name||'TBD')}</span>
      </div>
      <div class="row" style="gap:6px;margin-top:4px">
        <button class="btn ${isCorrection?'warn':'primary'} btn-confirm-score" style="flex:1;font-size:12px">${isCorrection?'✎ Corriger':'✓ Valider'}</button>
        <button class="btn btn-cancel-score" style="font-size:12px">✕</button>
      </div>
    </div>` : '';
  return `<div class="rr-card ${mCls}" data-match-id="${m.id}">
    <span class="rr-name rr-name-right ${w1?'rr-win':''}">${esc(m.p1_name||'TBD')}</span>
    ${scoreZone}
    <span class="rr-name ${w2?'rr-win':''}">${esc(m.p2_name||'TBD')}</span>
    ${editPart}
  </div>`;
}

/* ── Groups + Knockout render ── */
function renderGroupsKnockout(tournamentId){
  const matches = bundle.matches || [];
  const t = bundle.tournament;
  const groupMatches = matches.filter(m => m.bracket_side === 'G');
  const knockoutMatches = matches.filter(m => m.bracket_side !== 'G');
  const el = document.getElementById('bracket');
  el.className = '';
  const groupMap = new Map();
  groupMatches.forEach(m => {
    const gn = m.group_no ?? 0;
    if (!groupMap.has(gn)) groupMap.set(gn, []);
    groupMap.get(gn).push(m);
  });
  const GL = 'ABCDEFGHIJKLMNOP';
  const allGroupDone = groupMatches.length > 0 && groupMatches.every(m => m.status === 'completed');
  let html = '';
  if (!groupMap.size) {
    html = '<div class="muted">Phase de groupes vide.</div>';
  } else {
    html += '<div class="groups-grid">';
    [...groupMap.keys()].sort((a,b)=>a-b).forEach(gn => {
      const gms = groupMap.get(gn).sort((a,b)=>a.slot_no-b.slot_no);
      html += `<div class="group-section">
        <p class="group-label">Groupe ${GL[gn]||gn}</p>
        <div id="gst-${gn}"><div class="muted" style="font-size:12px">Chargement…</div></div>
        <div style="margin-top:8px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">Matchs</div>
        <div class="rr-matches">${gms.map(m=>matchCardRR(m)).join('')}</div>
      </div>`;
    });
    html += '</div>';
    if (!knockoutMatches.length) {
      html += `<div style="margin-top:10px">
        <button id="genKnockoutBtn" class="btn primary" ${allGroupDone?'':'disabled'}>
          ${allGroupDone?'Générer le tableau final':'En attente de la fin des groupes…'}
        </button>
      </div>`;
    }
  }
  if (knockoutMatches.length) {
    html += '<div class="bracket-section" style="margin-top:14px"><p class="section-label wb-label">Tableau final</p><div id="koTreeCnt"></div></div>';
  }
  el.innerHTML = html;
  if (knockoutMatches.length) {
    const tc = document.getElementById('koTreeCnt');
    if (tc) renderBracketTree(tc, knockoutMatches, (rNo,idx,arr)=>
      idx===arr.length-1?'Finale':(idx===arr.length-2?'Demi-finales':`Round ${rNo}`));
  }
  const genKBtn = document.getElementById('genKnockoutBtn');
  if (genKBtn) {
    genKBtn.onclick = async () => {
      if (!confirm('Générer le tableau final depuis les classements de groupe ?')) return;
      try {
        bundle = await api(`/admin/tournaments/${tournamentId}/generate-knockout`, hd('POST'));
        renderBracketAndMatches();
        if (window.lucide) lucide.createIcons();
      } catch(e){ alert(e.message); }
    };
  }
  (async () => {
    try {
      const d = await api(`/tournaments/${tournamentId}/standings`, hd());
      const gList = d.groups || [];
      const qpg = t.qualifiers_per_group || 2;
      gList.forEach(({ group_no, standings }) => {
        const cnt = document.getElementById(`gst-${group_no}`);
        if (!cnt) return;
        if (!standings.length) {
          cnt.innerHTML = '<div class="muted" style="font-size:12px">Classement après les premiers matchs.</div>';
          return;
        }
        cnt.innerHTML = `<table class="standings-table" style="font-size:12px">
          <thead><tr><th>#</th><th style="text-align:left">Joueur</th><th>J</th><th>Pts</th><th>Diff</th></tr></thead>
          <tbody>${standings.map((s,i)=>`<tr ${i<qpg?'class="qualifier-row"':''}>
            <td>${i+1}</td><td style="text-align:left">${esc(s.name)}</td>
            <td>${s.played}</td><td><strong>${s.pts}</strong></td>
            <td>${s.diff>=0?'+':''}${s.diff}</td>
          </tr>`).join('')}</tbody>
        </table>`;
      });
    } catch(_) {
      [...groupMap.keys()].forEach(gn => {
        const cnt = document.getElementById(`gst-${gn}`);
        if (cnt) cnt.innerHTML = '';
      });
    }
  })();
}

/* ── RR render (async standings) ── */
function renderRoundRobin(tournamentId){
  const matches = bundle.matches || [];
  const matchesHtml = matches.map(m => matchCardRR(m)).join('');
  const el = document.getElementById('bracket');
  el.className = '';
  el.innerHTML = `
    <div id="standingsContainer"><div class="muted" style="padding:6px 0">Chargement classement…</div></div>
    <h4 style="margin:12px 0 6px;font-size:13px;color:var(--muted);text-transform:uppercase;font-weight:600;letter-spacing:.04em">Matchs</h4>
    <div class="rr-matches">${matchesHtml || '<div class="muted">Bracket vide.</div>'}</div>`;

  (async () => {
    try {
      const d = await api(`/tournaments/${tournamentId}/standings`, hd());
      const standings = d.standings || [];
      const cnt = document.getElementById('standingsContainer');
      if (!cnt) return;
      if (!standings.length){
        cnt.innerHTML = '<div class="muted" style="padding:6px 0">Classement disponible après les premiers matchs.</div>';
        return;
      }
      cnt.innerHTML = `
        <h4 style="margin:0 0 6px;font-size:13px;color:var(--muted);text-transform:uppercase;font-weight:600;letter-spacing:.04em">Classement</h4>
        <div class="table-wrap" style="margin-bottom:6px">
          <table class="standings-table">
            <thead><tr><th>#</th><th style="text-align:left">Joueur</th><th>J</th><th>V</th><th>N</th><th>D</th><th>Pts</th><th>BF</th><th>BC</th><th>Diff</th></tr></thead>
            <tbody>${standings.map((s,i) => `<tr>
              <td>${i+1}</td>
              <td style="text-align:left">${esc(s.name)}</td>
              <td>${s.played}</td><td>${s.w}</td><td>${s.d}</td><td>${s.l}</td>
              <td><strong>${s.pts}</strong></td>
              <td>${s.bf}</td><td>${s.bc}</td>
              <td>${s.diff >= 0 ? '+' : ''}${s.diff}</td>
            </tr>`).join('')}</tbody>
          </table>
        </div>`;
    } catch(e){
      const cnt = document.getElementById('standingsContainer');
      if (cnt) cnt.innerHTML = '<div class="muted" style="padding:6px 0">Classement indisponible.</div>';
    }
  })();
}

/* ── Main render dispatcher ── */
function renderBracketAndMatches(){
  const b = bundle;
  if (!b || !b.tournament){
    document.getElementById('title').textContent = 'Bracket';
    document.getElementById('winner').innerHTML = '';
    document.getElementById('statusBadge').className = 'status';
    document.getElementById('statusBadge').textContent = '-';
    document.getElementById('tourMeta').textContent = '';
    const el = document.getElementById('bracket');
    el.className = '';
    el.innerHTML = '<div class="muted">Aucun tournoi chargé.</div>';
    applyLockState();
    return;
  }
  const t = b.tournament;
  document.getElementById('title').textContent = t.name;
  const badge = document.getElementById('statusBadge');
  badge.className = `status ${statusClass(t.status)}`;
  badge.textContent = t.status;

  const formatLabel = { single_elimination:'Élim. directe', round_robin:'Round Robin', double_elimination:'Double Élim.', groups_knockout:'Groupes' };
  document.getElementById('tourMeta').textContent = `${t.participants_count||0} participants · ${formatLabel[t.format]||t.format}`;

  const winnerEl = document.getElementById('winner');
  if (t.winner_name){
    winnerEl.innerHTML = `<div class="winner-banner"><i data-lucide="trophy" style="width:18px;height:18px;flex-shrink:0"></i> Vainqueur : ${esc(t.winner_name)}</div>`;
    if (window.lucide) lucide.createIcons({ nodes: [winnerEl] });
  } else {
    winnerEl.innerHTML = t.status === 'live' ? '<span class="muted" style="font-size:13px">Vainqueur : en cours…</span>' : '';
  }

  if (t.format === 'round_robin'){
    renderRoundRobin(t.id);
  } else if (t.format === 'double_elimination'){
    renderBracketDE();
  } else if (t.format === 'groups_knockout'){
    renderGroupsKnockout(t.id);
  } else {
    renderBracketSE();
  }
  applyLockState();
}

/* ── Load helpers ── */
async function loadTournaments(){
  const d = await api('/tournaments?all=1', hd());
  tournaments = d.tournaments || [];
  renderTournamentSelect();
}
async function loadTournament(id){
  if (!id){
    bundle = null; participantNames = [];
    renderBracketAndMatches(); renderParticipantsList(); return;
  }
  bundle = await api('/tournaments/' + encodeURIComponent(id), hd());
  // Populate local staging list from bundle
  participantNames = (bundle.participants || []).map(p => p.display_name || p.name || '').filter(Boolean);
  renderBracketAndMatches();
  renderParticipantsList();
  if (window.lucide) lucide.createIcons();
}
async function reloadAll(){
  await loadTournaments();
  const id = selectedTournamentId();
  if (id) await loadTournament(id);
  else { bundle = null; participantNames = []; renderBracketAndMatches(); renderParticipantsList(); }
}

/* ── Lock state ── */
function applyLockState(){
  const status = bundle?.tournament?.status;
  const fmt = bundle?.tournament?.format;
  const isDraft = !status || status === 'draft';
  const section = document.getElementById('participantsSection');
  if (section) section.classList.toggle('locked', !isDraft);
  ['addRow','bulkAddBtn','saveParticipantsBtn','generateBtn'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = isDraft ? '' : 'none';
  });
  document.querySelectorAll('.participant-rm').forEach(b => { b.disabled = !isDraft; });
  const notice = document.getElementById('lockNotice');
  if (notice){
    notice.style.display = isDraft ? 'none' : 'flex';
    if (!isDraft && window.lucide) lucide.createIcons({ nodes: [notice] });
  }
  const groupsCfg = document.getElementById('groupsConfig');
  if (groupsCfg) groupsCfg.style.display = (isDraft && fmt === 'groups_knockout') ? 'block' : 'none';
  const resetBtn = document.getElementById('resetStatusBtn');
  if (resetBtn) resetBtn.style.display = (status === 'completed' && fmt === 'groups_knockout') ? '' : 'none';
}

/* ── Inline bracket score entry ── */
document.getElementById('bracket').addEventListener('click', async e => {
  const scoreHit = e.target.closest('.score-val.clickable') || e.target.closest('.rr-scores.clickable');
  if (scoreHit){
    const card = scoreHit.closest('.match, .rr-card');
    if (card){
      document.querySelectorAll('#bracket .match.editing, #bracket .rr-card.editing').forEach(m => {
        if (m !== card){ m.classList.remove('editing'); m.closest('.bt-match')?.classList.remove('open'); }
      });
      card.classList.add('editing');
      card.closest('.bt-match')?.classList.add('open');
      card.querySelector('.score-in')?.focus();
    }
    return;
  }
  const cancelBtn = e.target.closest('.btn-cancel-score');
  if (cancelBtn){
    const card = cancelBtn.closest('.match, .rr-card');
    card?.classList.remove('editing');
    card?.closest('.bt-match')?.classList.remove('open');
    return;
  }

  const confirmBtn = e.target.closest('.btn-confirm-score');
  if (confirmBtn){
    const card = confirmBtn.closest('.match, .rr-card');
    if (!card) return;
    const matchId = Number(card.dataset.matchId);
    const inputs = card.querySelectorAll('.score-in');
    const s1 = Number(inputs[0]?.value ?? 0);
    const s2 = Number(inputs[1]?.value ?? 0);
    const tournamentId = selectedTournamentId();
    if (!tournamentId) return;
    confirmBtn.disabled = true;
    confirmBtn.textContent = '…';
    try {
      bundle = await api(`/admin/tournaments/${tournamentId}/matches/${matchId}/result`,
        hd('POST', { score_p1: s1, score_p2: s2 }));
      renderBracketAndMatches();
      renderParticipantsList();
      if (window.lucide) lucide.createIcons();
    } catch(err){
      alert(err.message);
      confirmBtn.disabled = false;
      confirmBtn.textContent = '✓ Valider';
    }
  }
});

/* ── Button handlers ── */
document.getElementById('createBtn').onclick = async () => {
  const name = (document.getElementById('newName').value || '').trim();
  const format = document.getElementById('newFormat').value;
  const starts = document.getElementById('newStartsAt').value || null;
  if (!name) return alert('Nom requis');
  try {
    const d = await api('/admin/tournaments', hd('POST', { name, format, starts_at: starts || null }));
    document.getElementById('createMsg').textContent = 'Tournoi créé ✓';
    await loadTournaments();
    document.getElementById('tourSel').value = String(d.tournament.id);
    await loadTournament(d.tournament.id);
  } catch(e){ alert(e.message); }
};

document.getElementById('reloadBtn').onclick = () => reloadAll().catch(e => alert(e.message));
document.getElementById('tourSel').onchange = () => loadTournament(selectedTournamentId()).catch(e => alert(e.message));

/* ── Participant add (single) ── */
function addParticipantName(name){
  name = (name || '').trim();
  if (!name) return;
  const lower = name.toLowerCase();
  if (participantNames.some(n => n.toLowerCase() === lower)){
    alert(`"${name}" est déjà dans la liste`); return;
  }
  if (name.length > 64){ alert('Nom trop long (max 64 caractères)'); return; }
  participantNames.push(name);
  renderParticipantsList();
}

document.getElementById('addParticipantBtn').onclick = () => {
  const inp = document.getElementById('newParticipantName');
  addParticipantName(inp.value);
  inp.value = ''; inp.focus();
};
document.getElementById('newParticipantName').onkeydown = (e) => {
  if (e.key === 'Enter'){ e.preventDefault(); document.getElementById('addParticipantBtn').click(); }
};

/* ── Remove participant on click ── */
document.getElementById('participantsList').addEventListener('click', e => {
  const btn = e.target.closest('.participant-rm');
  if (!btn) return;
  const idx = Number(btn.dataset.idx);
  if (Number.isInteger(idx)) { participantNames.splice(idx, 1); renderParticipantsList(); }
});

/* ── Bulk add ── */
document.getElementById('bulkAddBtn').onclick = () => {
  const area = document.getElementById('bulkAddArea');
  area.style.display = area.style.display === 'none' ? 'block' : 'none';
  if (area.style.display === 'block') document.getElementById('bulkNamesTa').focus();
};
document.getElementById('bulkCancelBtn').onclick = () => {
  document.getElementById('bulkAddArea').style.display = 'none';
  document.getElementById('bulkNamesTa').value = '';
};
document.getElementById('bulkConfirmBtn').onclick = () => {
  const raw = document.getElementById('bulkNamesTa').value;
  const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  let added = 0;
  lines.forEach(name => {
    if (name.length > 64) return;
    if (!participantNames.some(n => n.toLowerCase() === name.toLowerCase())){
      participantNames.push(name); added++;
    }
  });
  document.getElementById('bulkAddArea').style.display = 'none';
  document.getElementById('bulkNamesTa').value = '';
  renderParticipantsList();
  if (added === 0) alert('Aucun nouveau nom ajouté (doublons ou vide)');
};

/* ── Save participants ── */
document.getElementById('saveParticipantsBtn').onclick = async () => {
  const id = selectedTournamentId();
  if (!id) return alert('Sélectionne un tournoi');
  if (participantNames.length < 2) return alert('Minimum 2 participants');
  try {
    bundle = await api(`/admin/tournaments/${id}/participants`, hd('PUT', { names: participantNames }));
    participantNames = (bundle.participants || []).map(p => p.display_name || p.name || '').filter(Boolean);
    renderBracketAndMatches();
    renderParticipantsList();
  } catch(e){ alert(e.message); }
};

document.getElementById('generateBtn').onclick = async () => {
  const id = selectedTournamentId();
  if (!id) return alert('Sélectionne un tournoi');
  const fmt = bundle?.tournament?.format;
  const body = fmt === 'groups_knockout' ? {
    nb_groups: parseInt(document.getElementById('nbGroupsInput')?.value || 2, 10),
    qualifiers_per_group: parseInt(document.getElementById('qualPerGroupInput')?.value || 2, 10)
  } : undefined;
  try {
    bundle = await api(`/admin/tournaments/${id}/generate`, hd('POST', body));
    renderBracketAndMatches();
    if (window.lucide) lucide.createIcons();
  } catch(e){ alert(e.message); }
};

document.getElementById('resetStatusBtn').onclick = async () => {
  const id = selectedTournamentId();
  if (!id) return;
  if (!confirm('Réinitialiser le statut du tournoi en "en cours" ?')) return;
  try {
    bundle = await api(`/admin/tournaments/${id}`, hd('PATCH', { status: 'live' }));
    renderBracketAndMatches();
  } catch(e){ alert(e.message); }
};

document.getElementById('archiveBtn').onclick = async () => {
  const id = selectedTournamentId();
  if (!id) return;
  if (!confirm('Archiver ce tournoi ?')) return;
  try {
    bundle = await api(`/admin/tournaments/${id}`, hd('PATCH', { status: 'archived' }));
    await loadTournaments();
    renderBracketAndMatches();
  } catch(e){ alert(e.message); }
};

document.getElementById('deleteBtn').onclick = async () => {
  const id = selectedTournamentId();
  if (!id) return;
  if (!confirm('Supprimer ce tournoi ?')) return;
  try {
    await api(`/admin/tournaments/${id}`, hd('DELETE'));
    bundle = null;
    await loadTournaments();
    await loadTournament(selectedTournamentId());
  } catch(e){ alert(e.message); }
};

reloadAll().catch(err => alert(err.message));
</script>
