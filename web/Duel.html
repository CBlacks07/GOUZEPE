<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Duel — GOUZEPE eFOOTBALL</title>
<meta name="description" content="Duels eFootball - Affrontements en exhibition"/>
<meta name="theme-color" content="#16a34a"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/png" href="assets/icons/apple-touch-icon.png">
<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
<link rel="stylesheet" href="theme.css"/>
<link rel="stylesheet" href="common.css"/>
<link rel="stylesheet" href="mobile.css"/>
<script src="https://unpkg.com/lucide@latest"></script>
<script defer src="common.js"></script>
<style>
  .wrap{max-width:none!important;padding:12px 20px!important}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:12px}
  @media(max-width:900px){.grid{grid-template-columns:1fr}}
  .full{grid-column:1/-1}

  /* Section titles */
  .section-title{margin:0 0 14px;font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;color:var(--text)}
  .section-title i{width:15px;height:15px;color:var(--muted)}

  /* Fields */
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:600}

  /* Result pills */
  .res{display:flex;gap:10px;flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;user-select:none;background:var(--card);color:var(--text);transition:border-color .15s,background .15s,box-shadow .15s;outline:none}
  .pill:focus-visible{box-shadow:0 0 0 3px rgba(99,102,241,.35)}
  .pill[data-v="A"]{background:rgba(22,163,74,.08)}
  .pill[data-v="D"]{background:rgba(148,163,184,.08)}
  .pill[data-v="B"]{background:rgba(59,130,246,.08)}
  .pill[data-v="A"].active{border-color:rgba(22,163,74,.7);background:rgba(22,163,74,.18);box-shadow:0 0 0 2px rgba(22,163,74,.18)}
  .pill[data-v="D"].active{border-color:rgba(148,163,184,.6);background:rgba(148,163,184,.18);box-shadow:0 0 0 2px rgba(148,163,184,.18)}
  .pill[data-v="B"].active{border-color:rgba(59,130,246,.7);background:rgba(59,130,246,.18);box-shadow:0 0 0 2px rgba(59,130,246,.18)}

  /* Result tags in table */
  .tag{display:inline-block;border-radius:999px;padding:2px 10px;font-weight:700;font-size:12px;border:1px solid transparent;white-space:nowrap}
  .tag.win  {background:rgba(22,163,74,.15); color:#86efac; border-color:rgba(22,163,74,.3)}
  .tag.draw {background:rgba(148,163,184,.15);color:#cbd5e1; border-color:rgba(148,163,184,.3)}
  .tag.lose {background:rgba(59,130,246,.15); color:#93c5fd; border-color:rgba(59,130,246,.3)}
  :root.light .tag.win  {background:rgba(22,163,74,.12); color:#065f46;border-color:rgba(22,163,74,.4)}
  :root.light .tag.draw {background:rgba(100,116,139,.12);color:#334155;border-color:rgba(100,116,139,.4)}
  :root.light .tag.lose {background:rgba(59,130,246,.12); color:#1e3a8a;border-color:rgba(59,130,246,.4)}

  /* Table */
  .table-wrap{overflow:auto;border-radius:10px;border:1px solid var(--border)}
  table{width:100%;border-collapse:collapse}
  th,td{padding:9px 12px;text-align:center;border-bottom:1px solid var(--border);font-size:13px;color:var(--text)}
  tbody tr:last-child td{border-bottom:none}
  thead th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;background:rgba(255,255,255,.02);font-weight:700}
  tbody tr:hover td{background:rgba(255,255,255,.03)}
  :root.light tbody tr:hover td{background:rgba(0,0,0,.02)}

  /* Compare output */
  #cmpOut{margin-top:12px;font-size:14px}
  .cmp-row{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;padding:10px 14px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:10px}
  :root.light .cmp-row{background:rgba(0,0,0,.02)}
  .leader-tag{display:inline-block;padding:3px 12px;border-radius:999px;font-weight:700;font-size:13px;border:1px solid transparent}
  .leader-tag.win  {background:rgba(22,163,74,.15); color:#86efac;border-color:rgba(22,163,74,.3)}
  .leader-tag.draw {background:rgba(148,163,184,.15);color:#cbd5e1;border-color:rgba(148,163,184,.3)}
  .leader-tag.lose {background:rgba(59,130,246,.15); color:#93c5fd;border-color:rgba(59,130,246,.3)}
  :root.light .leader-tag.win  {color:#065f46;background:rgba(22,163,74,.12);border-color:rgba(22,163,74,.4)}
  :root.light .leader-tag.draw {color:#334155;background:rgba(100,116,139,.12);border-color:rgba(100,116,139,.4)}
  :root.light .leader-tag.lose {color:#1e3a8a;background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.4)}

  /* Filter bar */
  .filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .filter-bar label{font-size:12px;color:var(--muted);white-space:nowrap}
  .filter-bar select,.filter-bar input[type="date"]{font-size:12px;padding:5px 8px}

  /* Delete btn */
  .danger-link{border:none;background:transparent;color:#f87171;cursor:pointer;font-size:12px;padding:2px 6px;border-radius:4px}
  .danger-link:hover{background:rgba(248,113,113,.12)}
  :root.light .danger-link{color:#b91c1c}

  /* Save msg */
  .save-msg{font-size:12px;color:var(--muted);margin-top:6px;min-height:18px}

  /* Hint text */
  .hint{font-size:12px;color:var(--muted);margin-top:4px}
</style>
</head>
<body>
  <header class="top" id="topbar">
    <a class="brand" href="./Accueil.html" aria-label="Accueil GOUZEPE">
      <img id="clubLogo" class="logo" src="assets/icons/apple-touch-icon.png" alt="Logo">
      <div class="brand-title">
        <h1>GOUZEPE eFOOTBALL</h1>
        <div class="season-sub"><span id="season-text" style="color:#16a34a;font-weight:bold;">Duel</span></div>
      </div>
    </a>
    <button id="menuToggle" class="btn ghost" aria-controls="menu"><i data-lucide="menu"></i> Menu</button>
    <nav class="nav" aria-label="Navigation principale">
      <div id="menu" class="menu">
        <a href="./Accueil.html"><i data-lucide="home"></i> Accueil</a>
        <a href="./Duel.html"><i data-lucide="swords"></i> Duel</a>
        <a href="./Classement-general.html"><i data-lucide="bar-chart-2"></i> Classements</a>
        <a href="./Panel-Membre.html"><i data-lucide="user"></i> Mon espace</a>
        <a href="./Tournois.html"><i data-lucide="trophy"></i> Tournois</a>
        <a class="adminNav" href="./Admin-Joueurs.html" style="display:none"><i data-lucide="users"></i> Admin-Joueurs</a>
        <a class="adminNav" href="./Admin-Utilisateurs.html" style="display:none"><i data-lucide="shield"></i> Admin Utilisateurs</a>
        <a class="adminNav" href="./Admin-Sauvegardes.html" style="display:none"><i data-lucide="database"></i> Sauvegardes</a>
        <button id="logoutBtn" class="btn ghost danger" type="button"><i data-lucide="log-out"></i></button>
      </div>
    </nav>
    <div class="spacer"></div>
    <button id="themeBtn" class="btn ghost" title="Thème">
      <i data-lucide="sun" class="theme-icon-sun"></i>
      <i data-lucide="moon" class="theme-icon-moon" style="display:none"></i>
    </button>
  </header>

  <div class="wrap">
    <div class="grid">

      <!-- ── Nouveau duel ── -->
      <section class="card">
        <h3 class="section-title">
          <i data-lucide="swords"></i>Nouveau duel (exhibition)
        </h3>

        <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px">
          <div class="field" style="flex:1;min-width:150px">
            <label for="p1">Joueur A</label>
            <select id="p1"><option value="">Choisir…</option></select>
          </div>
          <div class="field" style="flex:1;min-width:150px">
            <label for="p2">Joueur B</label>
            <select id="p2"><option value="">Choisir…</option></select>
          </div>
        </div>

        <div class="field" style="margin-bottom:14px">
          <label>Résultat</label>
          <div class="res" id="resPick">
            <button class="pill" data-v="A" aria-pressed="false">
              <i data-lucide="trophy" style="width:13px;height:13px"></i> A gagne
            </button>
            <button class="pill" data-v="D" aria-pressed="false">
              <i data-lucide="handshake" style="width:13px;height:13px"></i> Nul
            </button>
            <button class="pill" data-v="B" aria-pressed="false">
              <i data-lucide="trophy" style="width:13px;height:13px"></i> B gagne
            </button>
          </div>
          <div class="hint">L'historique retient uniquement V/N/D (pas de score).</div>
        </div>

        <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end">
          <div class="field" style="flex:1;min-width:180px">
            <label for="dt">Date &amp; heure (facultatif)</label>
            <input id="dt" type="datetime-local"/>
          </div>
          <button id="save" class="btn primary">Enregistrer le duel</button>
        </div>
        <div id="saveMsg" class="save-msg">—</div>
      </section>

      <!-- ── Face-à-face ── -->
      <section class="card">
        <h3 class="section-title">
          <i data-lucide="users"></i>Face-à-face
        </h3>

        <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px">
          <div class="field" style="flex:1;min-width:130px">
            <label for="cA">Joueur A</label>
            <select id="cA"><option value="">Choisir…</option></select>
          </div>
          <div class="field" style="flex:1;min-width:130px">
            <label for="cB">Joueur B</label>
            <select id="cB"><option value="">Choisir…</option></select>
          </div>
        </div>

        <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-bottom:4px">
          <div class="field" style="flex:1;min-width:120px">
            <label for="from">Depuis</label>
            <input id="from" type="date"/>
          </div>
          <div class="field" style="flex:1;min-width:120px">
            <label for="to">Jusqu'au</label>
            <input id="to" type="date"/>
          </div>
          <button id="compare" class="btn">Comparer</button>
        </div>

        <div id="cmpOut"></div>
      </section>

      <!-- ── Historique ── -->
      <section class="card full">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:14px">
          <h3 class="section-title" style="margin:0">
            <i data-lucide="clock"></i>Historique des duels
          </h3>
          <div class="filter-bar">
            <label>Période</label>
            <select id="period">
              <option value="all" selected>Toujours</option>
              <option value="today">Aujourd'hui</option>
              <option value="week">7 jours</option>
              <option value="month">30 jours</option>
            </select>
            <label>De</label><input id="histFrom" type="date">
            <label>À</label><input id="histTo" type="date">
            <label>Joueur</label><select id="histP"><option value="">Tous</option></select>
            <label>Afficher</label>
            <select id="limit">
              <option>5</option><option selected>10</option><option>20</option><option>50</option>
            </select>
            <button id="refresh" class="btn" style="padding:5px 10px;font-size:12px">
              <i data-lucide="refresh-cw" style="width:12px;height:12px"></i> Rafraîchir
            </button>
            <a id="exportCsv" class="btn" href="#" style="padding:5px 10px;font-size:12px">CSV</a>
            <a id="exportPdf" class="btn" href="#" target="_blank" rel="noopener" style="padding:5px 10px;font-size:12px">PDF</a>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Joueur A</th>
                <th>Résultat</th>
                <th>Joueur B</th>
                <th>Leader</th>
                <th class="adminOnly">Actions</th>
              </tr>
            </thead>
            <tbody id="list"></tbody>
          </table>
        </div>
      </section>

    </div>
  </div>

<script>
/* ── Helpers définis localement (pas de dépendance sur common.js au parse-time) ── */
const $ = s => document.querySelector(s);
const esc = t => String(t??'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

/* Lit le token depuis localStorage à chaque appel (common.js peut l'avoir mis à jour) */
const hd = (m='GET') => ({
  method: m,
  headers: { 'Content-Type':'application/json', Authorization:'Bearer '+(localStorage.getItem('efoot.token')||'') }
});

/* API base : window.API est positionné par common.js (defer) avant DOMContentLoaded */
const getAPI = () => window.API || localStorage.getItem('efoot.api') || ('http://'+location.hostname+':3005');

const nowLocal = () => {
  const d = new Date(); d.setSeconds(0,0);
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
};

/* ── State ── */
const NAME_BY_ID = new Map();
let MY_PID  = null;
let MY_ROLE = 'member';
let RESULT  = null;

/* ── Chargement joueurs ── */
async function loadPlayers() {
  const r = await fetch(getAPI()+'/players', hd());
  const d = await r.json().catch(() => ({ players:[] }));
  const list = (d.players||[]).sort((a,b) => (a.name||a.player_id).localeCompare(b.name||b.player_id,'fr'));
  list.forEach(p => NAME_BY_ID.set(String(p.player_id), p.name||p.player_id));
  const opts = list.map(p => `<option value="${esc(p.player_id)}">${esc(p.name||p.player_id)} — ${esc(p.player_id)}</option>`).join('');
  ['p1','p2','cA','cB','histP'].forEach(id => {
    const sel = $('#'+id);
    if (sel) sel.innerHTML = (id==='histP' ? '<option value="">Tous</option>' : '<option value="">Choisir…</option>') + opts;
  });
}

/* ── Enregistrer un duel ── */
async function onSave() {
  const btn = $('#save'), msg = $('#saveMsg');
  msg.textContent = '…'; btn.disabled = true;
  try {
    const p1 = $('#p1').value.trim(), p2 = $('#p2').value.trim();
    if (!p1 || !p2) throw new Error('Sélectionne les deux joueurs.');
    if (p1 === p2)  throw new Error('Choisis deux joueurs différents.');
    if (!RESULT)    throw new Error('Choisis le résultat (A gagne / Nul / B gagne).');
    if (MY_ROLE !== 'admin') {
      if (!MY_PID) throw new Error("Votre compte n'est lié à aucun player_id");
      if (p1 !== MY_PID && p2 !== MY_PID) throw new Error("Vous ne pouvez enregistrer qu'un duel auquel vous participez.");
    }
    const dt = $('#dt').value ? new Date($('#dt').value).toISOString() : null;
    let score_a = 0, score_b = 0;
    if (RESULT === 'A') { score_a = 1; } else if (RESULT === 'B') { score_b = 1; }
    const body = { p1, p2, score_a, score_b }; if (dt) body.played_at = dt;
    const r = await fetch(getAPI()+'/duels', { ...hd('POST'), body: JSON.stringify(body) });
    const d = await r.json().catch(() => ({})); if (!r.ok) throw new Error(d.error || ('HTTP '+r.status));
    msg.innerHTML = '<i data-lucide="check" style="width:13px;height:13px;vertical-align:middle;color:#86efac"></i> Duel enregistré';
    if (window.lucide) lucide.createIcons({ nodes:[msg] });
    RESULT = null; document.querySelectorAll('#resPick .pill').forEach(x => x.classList.remove('active'));
    $('#dt').value = nowLocal();
    await refreshRecent();
  } catch(e) {
    msg.innerHTML = '<i data-lucide="x-circle" style="width:13px;height:13px;vertical-align:middle;color:#f87171"></i> ' + esc(e.message||'Erreur');
    if (window.lucide) lucide.createIcons({ nodes:[msg] });
  } finally {
    btn.disabled = false;
  }
}

/* ── Face-à-face ── */
function leaderBadge(w, d, l) {
  let cls = 'draw', lab = 'Égalité';
  if (w > l) { cls='win';  lab='Leader A'; }
  else if (l > w) { cls='lose'; lab='Leader B'; }
  return `<span class="leader-tag ${cls}">${lab} &bull; ${w}V-${d}N-${l}D</span>`;
}
async function onCompare() {
  const A = $('#cA').value.trim(), B = $('#cB').value.trim();
  const F = $('#from').value.trim(), T = $('#to').value.trim();
  const out = $('#cmpOut'); out.innerHTML = '';
  if (!A || !B) { out.innerHTML = '<div class="hint" style="margin-top:8px">Choisis deux joueurs.</div>'; return; }
  if (A === B)  { out.innerHTML = '<div class="hint" style="margin-top:8px">Les joueurs doivent être différents.</div>'; return; }
  const qs = new URLSearchParams({ p1:A, p2:B }); if (F) qs.set('from',F); if (T) qs.set('to',T);
  const r = await fetch(getAPI()+'/duels/compare?'+qs.toString(), hd());
  const d = await r.json().catch(() => ({}));
  if (!r.ok) { out.innerHTML = '<div class="hint" style="margin-top:8px">Erreur lors de la comparaison.</div>'; return; }
  const t = d.totals || { wins:0, draws:0, losses:0, legs:0 };
  const nA = d.p1?.name || NAME_BY_ID.get(A) || A;
  const nB = d.p2?.name || NAME_BY_ID.get(B) || B;
  out.innerHTML = `<div class="cmp-row">
    <div><strong>${esc(nA)}</strong> <span class="muted" style="font-size:13px">vs</span> <strong>${esc(nB)}</strong> <span class="muted" style="font-size:12px;margin-left:6px">${t.legs||0} match(s)</span></div>
    <div>${leaderBadge(t.wins, t.draws, t.losses)}</div>
  </div>`;
}

/* ── Historique ── */
function periodToRange(v) {
  const d = new Date(); const pad = n => String(n).padStart(2,'0');
  const iso = x => `${x.getFullYear()}-${pad(x.getMonth()+1)}-${pad(x.getDate())}`;
  if (v === 'today') { return { from:iso(d), to:iso(d) }; }
  if (v === 'week')  { const a = new Date(); a.setDate(d.getDate()-6); return { from:iso(a), to:iso(d) }; }
  if (v === 'month') { const a = new Date(); a.setDate(d.getDate()-29); return { from:iso(a), to:iso(d) }; }
  return { from:$('#histFrom').value||'', to:$('#histTo').value||'' };
}
async function refreshRecent() {
  const L = parseInt($('#limit').value||'10', 10);
  const p = $('#histP').value || '';
  const { from, to } = periodToRange($('#period').value);
  const qs = new URLSearchParams({ limit:String(L) });
  if (p)    qs.set('p', p);
  if (from) qs.set('from', from);
  if (to)   qs.set('to', to);
  $('#exportCsv').href = `${getAPI()}/duels/export.csv?${qs.toString()}`;
  $('#exportPdf').href = `${getAPI()}/duels/export.html?${qs.toString()}`;
  const r = await fetch(getAPI()+'/duels/recent?'+qs.toString(), hd());
  const d = await r.json().catch(() => ({ duels:[] }));
  const tb = $('#list'); tb.innerHTML = '';
  (d.duels||[]).forEach(row => {
    const a = +row.score_a, b = +row.score_b;
    const cls  = a > b ? 'win' : (a < b ? 'lose' : 'draw');
    const res  = a > b ? 'A gagne' : (a < b ? 'B gagne' : 'Nul');
    const leader = a > b ? (row.p1_name||row.p1_id) : (a < b ? (row.p2_name||row.p2_id) : 'Égalité');
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="color:var(--muted);font-size:12px">${new Date(row.played_at).toLocaleString('fr-FR')}</td>
      <td style="font-weight:500">${esc(row.p1_name||row.p1_id)}</td>
      <td><span class="tag ${cls}">${esc(res)}</span></td>
      <td style="font-weight:500">${esc(row.p2_name||row.p2_id)}</td>
      <td style="font-weight:600">${esc(leader)}</td>
      <td class="adminOnly">${MY_ROLE==='admin'
        ? `<button class="danger-link" data-del="${row.id}">Supprimer</button>` : '—'}</td>`;
    tb.appendChild(tr);
  });
}

document.getElementById('list').addEventListener('click', async e => {
  const id = e.target?.dataset?.del; if (!id) return;
  if (MY_ROLE !== 'admin') return alert('Réservé aux administrateurs.');
  if (!confirm('Supprimer ce duel ?')) return;
  const r = await fetch(getAPI()+'/duels/'+encodeURIComponent(id), hd('DELETE'));
  if (!r.ok) { const d = await r.json().catch(()=>({})); alert(d.error||('HTTP '+r.status)); return; }
  await refreshRecent();
});

/* ── Init : s'exécute après common.js (defer) ET après le DOM ── */
document.addEventListener('DOMContentLoaded', async () => {
  const tok   = localStorage.getItem('efoot.token');
  const expAt = +localStorage.getItem('efoot.expAt') || 0;
  if (!tok || (expAt > 0 && Date.now() >= expAt)) { location.replace('login.html'); return; }

  /* Charger MY_PID / MY_ROLE */
  try {
    const r = await fetch(getAPI()+'/auth/me', hd());
    if (r.ok) {
      const d = await r.json();
      MY_ROLE = (d.user?.role || 'member').toLowerCase();
      MY_PID  = d.user?.player_id || null;
    }
  } catch(_) {}

  /* Sélection résultat */
  const box = $('#resPick');
  function setActive(btn) {
    RESULT = btn.dataset.v;
    box.querySelectorAll('.pill').forEach(x => {
      const on = (x === btn);
      x.classList.toggle('active', on);
      x.setAttribute('aria-pressed', on ? 'true' : 'false');
    });
  }
  box.addEventListener('click', e => { const b = e.target.closest('.pill'); if(b) setActive(b); });
  box.addEventListener('keydown', e => {
    if (e.key !== ' ' && e.key !== 'Enter') return;
    const b = e.target.closest('.pill'); if (!b) return;
    e.preventDefault(); setActive(b);
  });
  box.querySelectorAll('.pill').forEach(p => p.setAttribute('tabindex','0'));

  /* Autres initialisations */
  $('#dt').value = nowLocal();
  await loadPlayers();
  document.getElementById('save').addEventListener('click', onSave);
  document.getElementById('compare').addEventListener('click', onCompare);
  document.getElementById('refresh').addEventListener('click', refreshRecent);
  ['period','histFrom','histTo','histP','limit'].forEach(id => $('#'+id).addEventListener('change', refreshRecent));
  await refreshRecent();
  if (window.lucide) lucide.createIcons();
});
</script>
</body>
</html>
